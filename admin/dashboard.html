<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{margin:0;font-family:'Segoe UI';background:#f3f6fb;}

    .admin-header{
      background:#4f46e5;
      color:white;
      padding:15px 25px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .admin-logo{font-weight:600;font-size:18px;}

    .admin-right{display:flex;gap:15px;align-items:center;}

    .admin-right button{
      background:white;
      color:#4f46e5;
      border:none;
      padding:6px 12px;
      border-radius:6px;
      cursor:pointer;
    }

    .container{
      max-width:1100px;
      margin:40px auto;
      padding:20px;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
    }

    .nav-buttons{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .nav-buttons button{
      background:#4f46e5;
      color:white;
      border:none;
      padding:14px 20px;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
    }
  </style>
</head>
<body>

<div class="admin-header">
  <div class="admin-logo">Gigto Admin Panel</div>
  <div></div>
  <div class="admin-right">
    <span id="adminName"></span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Control Panel</h2>
    <div class="nav-buttons">
      <button onclick="goBookings()">Manage Bookings</button>
      <button onclick="goWorkers()">Manage Workers</button>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "../firebase.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    window.location.href="../auth.html";
    return;
  }

  currentUser=user;

  const snap=await getDoc(doc(db,"admins",user.uid));
  if(!snap.exists() || snap.data().status!=="active"){
    await signOut(auth);
    window.location.href="../auth.html";
    return;
  }

  document.getElementById("adminName").innerText=user.email;
});

window.logout=async function(){
  await signOut(auth);
  window.location.href="../auth.html";
};

window.goBookings=function(){
  window.location.href="managebookings.html";
};

window.goWorkers=function(){
  window.location.href="viewgigs.html";
};
</script>

</body>
</html>
