<!DOCTYPE html>
<html>
<head>
  <title>My Bookings - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background:#f4f7fb;
    }

    /* HEADER */
    header {
      background: linear-gradient(90deg,#4f46e5,#06b6d4);
      padding:15px;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .menu-icon { font-size:22px; cursor:pointer; }
    .logo { font-weight:bold; font-size:18px; cursor:pointer; }
    .profile { font-size:13px; }

    /* MENU */
    .side-menu {
      position:fixed;
      top:0;
      left:-250px;
      width:230px;
      height:100%;
      background:white;
      box-shadow:4px 0 12px rgba(0,0,0,0.15);
      padding-top:60px;
      display:flex;
      flex-direction:column;
      transition:left 0.3s ease;
      z-index:1000;
    }

    .side-menu.open { left:0; }

    .side-menu a {
      padding:15px 20px;
      text-decoration:none;
      color:#333;
      border-bottom:1px solid #eee;
      font-weight:500;
    }

    #overlay {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.3);
      display:none;
      z-index:999;
    }

    #overlay.show { display:block; }

    .container {
      max-width:600px;
      margin:auto;
      padding:20px;
    }

    .section-title {
      font-size:20px;
      font-weight:bold;
      margin-top:25px;
      margin-bottom:5px;
    }

    .count {
      font-size:13px;
      color:#666;
      margin-bottom:15px;
    }

    /* CARD */
    .card {
      background:white;
      padding:18px;
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      margin-bottom:18px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .badge {
      display:inline-block;
      padding:4px 10px;
      border-radius:20px;
      font-size:12px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .pending { background:#fff4e5; color:#e67e22; }
    .assigned { background:#e0f2fe; color:#0284c7; }
    .in_progress { background:#f3e8ff; color:#9333ea; }
    .completed { background:#e6f4ea; color:#1e7e34; }
    .cancelled { background:#fdecea; color:#b02a37; }

    .service {
      font-size:16px;
      font-weight:600;
      margin-bottom:5px;
    }

    .address {
      font-size:13px;
      color:#555;
    }

    .time {
      font-size:12px;
      color:#777;
      margin-top:6px;
    }

    .details {
      margin-top:10px;
      font-size:13px;
      color:#555;
      display:none;
      border-top:1px solid #eee;
      padding-top:10px;
    }

    .cancel-btn {
      margin-top:10px;
      padding:6px 12px;
      border:none;
      border-radius:8px;
      background:#dc2626;
      color:white;
      font-size:12px;
      cursor:pointer;
    }

    .empty {
      text-align:center;
      color:#777;
      margin-top:20px;
    }
  </style>
</head>

<body>

<header>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div class="logo" onclick="goHome()">Gigto</div>
  <div id="profileSection" class="profile"></div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu" class="side-menu">
  <a href="index.html">Home</a>
  <a href="profile.html">Profile</a>
  <a href="my-bookings.html">My Bookings</a>
</div>

<div class="container">

  <div class="section-title">Active Bookings</div>
  <div class="count" id="activeCount"></div>
  <div id="activeBookings"></div>

  <div class="section-title">Booking History</div>
  <div class="count" id="historyCount"></div>
  <div id="historyBookings"></div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;

window.toggleMenu = function(){
  document.getElementById("sideMenu").classList.add("open");
  document.getElementById("overlay").classList.add("show");
};

window.closeMenu = function(){
  document.getElementById("sideMenu").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
};

window.goHome = function(){
  window.location.href = "index.html";
};

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
  document.getElementById("profileSection").innerText = user.phoneNumber;

  loadBookings();
});

async function loadBookings() {

  const activeDiv = document.getElementById("activeBookings");
  const historyDiv = document.getElementById("historyBookings");

  activeDiv.innerHTML = "";
  historyDiv.innerHTML = "";

  let activeCount = 0;
  let historyCount = 0;

  const q = query(
    collection(db, "bookings"),
    where("userId", "==", currentUser.uid)
  );

  const snapshot = await getDocs(q);

  if (snapshot.empty) {
    activeDiv.innerHTML = "<div class='empty'>No bookings found</div>";
    return;
  }

  snapshot.forEach(docSnap => {

    const data = docSnap.data();
    const status = data.status;

    const createdTime = data.createdAt?.seconds
      ? new Date(data.createdAt.seconds * 1000).toLocaleString()
      : "Time unavailable";

    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
      <div class="badge ${status}">${formatStatus(status)}</div>
      <div class="service">${data.serviceType}</div>
      <div class="address">${data.address}</div>
      <div class="time">${createdTime}</div>
      <div class="details">
        Phone: ${data.phone}<br>
        Booking ID: ${docSnap.id}
      </div>
    `;

    // Expand details
    card.onclick = () => {
      const details = card.querySelector(".details");
      details.style.display = details.style.display === "block" ? "none" : "block";
    };

    // Cancel button
    if (status === "pending") {
      const cancelBtn = document.createElement("button");
      cancelBtn.classList.add("cancel-btn");
      cancelBtn.innerText = "Cancel Booking";
      cancelBtn.onclick = async (e) => {
        e.stopPropagation();
        await updateDoc(doc(db, "bookings", docSnap.id), {
          status: "cancelled"
        });
        loadBookings();
      };
      card.appendChild(cancelBtn);
    }

    if (["pending","assigned","in_progress"].includes(status)) {
      activeDiv.appendChild(card);
      activeCount++;
    } else {
      historyDiv.appendChild(card);
      historyCount++;
    }

  });

  document.getElementById("activeCount").innerText = activeCount + " active booking(s)";
  document.getElementById("historyCount").innerText = historyCount + " completed / cancelled";
}

function formatStatus(status) {
  switch(status) {
    case "pending": return "🟡 Waiting for Assignment";
    case "assigned": return "🔵 Worker Assigned";
    case "in_progress": return "🟣 Work In Progress";
    case "completed": return "🟢 Completed";
    case "cancelled": return "🔴 Cancelled";
    default: return status;
  }
}
</script>

</body>
</html>
