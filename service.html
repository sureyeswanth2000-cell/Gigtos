<!DOCTYPE html>
<html>
<head>
  <title>Book Service - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:'Segoe UI'; background:#f4f7fb; }

    header {
      background: linear-gradient(90deg, #4f46e5, #06b6d4);
      padding: 15px;
      color: white;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .menu-icon { font-size:22px; cursor:pointer; }
    .logo { font-size:20px; font-weight:bold; cursor:pointer; }
    .profile { font-size:13px; cursor:pointer; }

    .hidden { display:none; }

    .side-menu {
      position:fixed;
      top:0;
      left:0;
      width:230px;
      height:100%;
      background:white;
      box-shadow:4px 0 12px rgba(0,0,0,0.1);
      padding-top:60px;
      display:flex;
      flex-direction:column;
      z-index:1000;
    }

    .side-menu a {
      padding:15px 20px;
      text-decoration:none;
      color:#333;
      border-bottom:1px solid #eee;
    }

    .container { max-width:500px; margin:auto; padding:20px; }

    .card {
      background:white;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      margin-bottom:20px;
    }

    input {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ddd;
      margin-bottom:12px;
    }

    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#4f46e5;
      color:white;
      cursor:pointer;
    }

    .success { color:green; text-align:center; font-weight:bold; }
  </style>
</head>

<body>

<header>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div class="logo" onclick="goHome()">Gigto</div>
  <div id="profileSection" class="profile hidden"></div>
</header>

<div id="sideMenu" class="side-menu hidden">
  <a href="index.html">Home</a>
</div>

<div class="container">

  <div class="card">
    <h2 id="serviceTitle"></h2>
    <p>₹200 Visiting Charge</p>
  </div>

  <div class="card" id="phoneSection">
    <input type="text" id="phone" placeholder="10 digit mobile number">
    <div id="recaptcha-container"></div>
    <button onclick="sendOTP()">Send OTP</button>
  </div>

  <div class="card hidden" id="otpSection">
    <input type="text" id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify OTP</button>
  </div>

  <div class="card hidden" id="bookingSection">
    <input type="text" id="customerName" placeholder="Your Name">
    <input type="text" id="address" placeholder="Your Address">
    <button onclick="confirmBooking()">Confirm Booking</button>
  </div>

  <div id="successMsg" class="success hidden">
    Booking Submitted Successfully!
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  RecaptchaVerifier,
  signInWithPhoneNumber,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  collection,
  addDoc,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let confirmationResult;
let currentUser;

const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type") || "Service";
document.getElementById("serviceTitle").innerText = serviceType;

window.toggleMenu = function() {
  document.getElementById("sideMenu").classList.toggle("hidden");
};

window.goHome = function() {
  window.location.href = "index.html";
};

onAuthStateChanged(auth, async (user) => {

  if (user) {
    currentUser = user;

    const profile = document.getElementById("profileSection");

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    let displayName = user.phoneNumber;

    if (snap.exists() && snap.data().name) {
      displayName = snap.data().name;
      document.getElementById("customerName").value = snap.data().name || "";
      document.getElementById("address").value = snap.data().address || "";
    }

    profile.innerText = "👤 " + displayName;
    profile.classList.remove("hidden");

    profile.onclick = () => {
      window.location.href = "profile.html";
    };

    document.getElementById("phoneSection").classList.add("hidden");
    document.getElementById("otpSection").classList.add("hidden");
    document.getElementById("bookingSection").classList.remove("hidden");

  }
});

window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
  size: 'normal'
});

window.sendOTP = async function() {
  let phone = document.getElementById("phone").value.trim();
  if (phone.length !== 10) return alert("Invalid number");
  phone = "+91" + phone;
  confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
  document.getElementById("phoneSection").classList.add("hidden");
  document.getElementById("otpSection").classList.remove("hidden");
};

window.verifyOTP = async function() {
  const otp = document.getElementById("otp").value;
  const result = await confirmationResult.confirm(otp);
  currentUser = result.user;
  document.getElementById("otpSection").classList.add("hidden");
  document.getElementById("bookingSection").classList.remove("hidden");
};

window.confirmBooking = async function() {

  const name = document.getElementById("customerName").value.trim();
  const address = document.getElementById("address").value.trim();

  await setDoc(doc(db, "users", currentUser.uid), {
    phone: currentUser.phoneNumber,
    name,
    address
  });

  await addDoc(collection(db, "bookings"), {
    serviceType,
    customerName: name,
    address,
    phone: currentUser.phoneNumber,
    status: "pending",
    createdAt: new Date()
  });

  document.getElementById("bookingSection").classList.add("hidden");
  document.getElementById("successMsg").classList.remove("hidden");
};
</script>

</body>
</html>
