<!DOCTYPE html>
<html>
<head>
  <title>Book Service - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:'Segoe UI'; background:#f4f7fb; }

    header {
      background: linear-gradient(90deg,#4f46e5,#06b6d4);
      padding:15px;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .menu-icon { font-size:22px; cursor:pointer; }
    .logo { font-size:18px; font-weight:bold; cursor:pointer; }
    .profile { font-size:13px; }

    .container { max-width:500px; margin:auto; padding:20px; }

    .card {
      background:white;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      margin-bottom:20px;
    }

    input {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ddd;
      margin-bottom:12px;
    }

    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#4f46e5;
      color:white;
      cursor:pointer;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<header>
  <div class="menu-icon" onclick="openMenu()">☰</div>
  <div class="logo" onclick="goHome()">Gigto</div>
  <div id="profileSection" class="profile"></div>
</header>

<div class="container">

  <div class="card">
    <h2 id="serviceTitle"></h2>
    <p>₹200 Visiting Charge</p>
  </div>

  <div class="card hidden" id="bookingSection">
    <input type="text" id="customerName" placeholder="Your Name">
    <input type="text" id="address" placeholder="Your Address">
    <button onclick="confirmBooking()">Confirm Booking</button>
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;
const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type") || "Service";

document.getElementById("serviceTitle").innerText = serviceType;
window.goHome = () => window.location.href = "index.html";

onAuthStateChanged(auth,(user)=>{
  if(!user) return window.location.href="index.html";
  currentUser = user;
  document.getElementById("profileSection").innerText = user.phoneNumber;
  document.getElementById("bookingSection").classList.remove("hidden");
});

window.confirmBooking = async function(){

  const name = document.getElementById("customerName").value.trim();
  const address = document.getElementById("address").value.trim();

  if(!name || !address) return alert("Fill all details");

  await addDoc(collection(db,"bookings"),{
    userId: currentUser.uid,
    serviceType,
    customerName:name,
    address,
    phone: currentUser.phoneNumber,
    status:"pending",
    createdAt:new Date()
  });

  window.location.href="my-bookings.html";
};
</script>

<script type="module" src="./components/menu.js"></script>

</body>
</html>
