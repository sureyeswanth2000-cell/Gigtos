<!DOCTYPE html>
<html>
<head>
  <title>View Workers</title>
</head>
<body>

<h2>View Gig Workers</h2>
<p id="roleInfo"></p>

<select id="filterType" onchange="loadWorkers()">
  <option value="all">All</option>
  <option value="Plumber">Plumber</option>
  <option value="Electrician">Electrician</option>
</select>

<ul id="workerList"></ul>

<br>
<button onclick="goDashboard()">Back to Dashboard</button>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  
let currentUser;
let currentRole;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const adminSnap = await getDoc(doc(db, "admins", user.uid));

  if (!adminSnap.exists()) {
    alert("Not authorized");
    window.location.href = "index.html";
    return;
  }

  currentRole = adminSnap.data().role;
  document.getElementById("roleInfo").innerText = "Role: " + currentRole;

  loadWorkers();
});

window.loadWorkers = async function () {
  const list = document.getElementById("workerList");
  list.innerHTML = "";

  const filter = document.getElementById("filterType").value;
  
let q;

if (currentRole === "superadmin") {
  q = collection(db, "gig_workers");
} else {
  q = query(
    collection(db, "gig_workers"),
    where("adminId", "==", currentUser.uid)
  );
}

const snapshot = await getDocs(q);

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    // Filter by gig type
    if (filter !== "all" && data.gigType !== filter) return;

    // Admin sees only own workers
    if (currentRole === "admin" && data.adminId !== currentUser.uid) {
      return;
    }

    const li = document.createElement("li");

    li.innerHTML = `
      <b>${data.name}</b> - ${data.gigType}
      <br>Contact: ${data.contact}
      <br>Created By: ${data.createdByEmail}
      <br><br>
    `;

    // Edit Button
    if (
      currentRole === "superadmin" ||
      (currentRole === "admin" && data.adminId === currentUser.uid)
    ) {
      const editBtn = document.createElement("button");
      editBtn.innerText = "Edit";
      editBtn.onclick = () => {
        window.location.href = "dashboard.html?edit=" + docSnap.id;
      };
      li.appendChild(editBtn);
    }

    // Delete Button (Superadmin only)
    if (currentRole === "superadmin") {
      const delBtn = document.createElement("button");
      delBtn.innerText = "Delete";
      delBtn.onclick = async () => {
        await deleteDoc(doc(db, "gig_workers", docSnap.id));
        loadWorkers();
      };
      li.appendChild(delBtn);
    }

    list.appendChild(li);
  });
};

window.goDashboard = function () {
  window.location.href = "dashboard.html";
};
</script>

</body>
</html>
