<!DOCTYPE html>
<html>
<head>
  <title>My Bookings - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background:#f3f6fb;
    }

    header {
      background: linear-gradient(90deg,#4f46e5,#06b6d4);
      padding:15px;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .menu-icon { font-size:22px; cursor:pointer; }
    .logo { font-weight:bold; font-size:18px; cursor:pointer; }
    .profile { font-size:13px; }

    .container {
      max-width:600px;
      margin:auto;
      padding:20px;
    }

    .section-title {
      font-size:20px;
      font-weight:700;
      margin-top:30px;
      margin-bottom:5px;
    }

    .count {
      font-size:13px;
      color:#777;
      margin-bottom:15px;
    }

    .card {
      background:white;
      padding:18px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.06);
      margin-bottom:18px;
      transition:0.2s;
      cursor:pointer;
      border-left:5px solid transparent;
    }

    .card.active-highlight {
      border-left:5px solid #4f46e5;
    }

    .badge {
      display:inline-block;
      padding:4px 12px;
      border-radius:20px;
      font-size:12px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .pending { background:#fff4e5; color:#e67e22; }
    .assigned { background:#e0f2fe; color:#0284c7; }
    .in_progress { background:#f3e8ff; color:#9333ea; }
    .completed { background:#e6f4ea; color:#1e7e34; }
    .cancelled { background:#fdecea; color:#b02a37; }

    .service {
      font-size:16px;
      font-weight:600;
      margin-bottom:5px;
    }

    .address {
      font-size:13px;
      color:#555;
    }

    .time {
      font-size:12px;
      color:#777;
      margin-top:6px;
    }

    .details {
      margin-top:12px;
      font-size:13px;
      color:#555;
      display:none;
      border-top:1px solid #eee;
      padding-top:10px;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(-5px); }
      to { opacity:1; transform:translateY(0); }
    }

    .cancel-btn {
      margin-top:12px;
      padding:8px 14px;
      border:none;
      border-radius:8px;
      background:#ef4444;
      color:white;
      font-size:13px;
      cursor:pointer;
    }

    .cancel-btn:hover {
      background:#dc2626;
    }

    .empty {
      text-align:center;
      color:#777;
      margin-top:20px;
      font-size:14px;
    }
  </style>
</head>

<body>

<header>
  <div class="menu-icon" onclick="openMenu()">☰</div>
  <div class="logo" onclick="goHome()">Gigto</div>
  <div id="profileSection" class="profile"></div>
</header>

<div class="container">

  <div class="section-title">Active Bookings</div>
  <div class="count" id="activeCount"></div>
  <div id="activeBookings"></div>

  <div class="section-title">Booking History</div>
  <div class="count" id="historyCount"></div>
  <div id="historyBookings"></div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;

window.goHome = () => window.location.href = "index.html";

onAuthStateChanged(auth, async (user) => {
  if (!user) return window.location.href = "index.html";
  currentUser = user;
  document.getElementById("profileSection").innerText = user.phoneNumber;
  loadBookings();
});

async function loadBookings() {

  const activeDiv = document.getElementById("activeBookings");
  const historyDiv = document.getElementById("historyBookings");

  activeDiv.innerHTML = "";
  historyDiv.innerHTML = "";

  let activeCount = 0;
  let historyCount = 0;

  const q = query(collection(db,"bookings"), where("userId","==",currentUser.uid));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    activeDiv.innerHTML = "<div class='empty'>No bookings found</div>";
    return;
  }

  snapshot.forEach(docSnap => {

    const data = docSnap.data();
    const createdTime = data.createdAt?.seconds
      ? new Date(data.createdAt.seconds * 1000).toLocaleString()
      : "Time unavailable";

    const card = document.createElement("div");
    card.classList.add("card");

    if(["pending","assigned","in_progress"].includes(data.status)){
      card.classList.add("active-highlight");
    }

    card.innerHTML = `
      <div class="badge ${data.status}">${data.status.toUpperCase()}</div>
      <div class="service">${data.serviceType}</div>
      <div class="address">${data.address}</div>
      <div class="time">${createdTime}</div>
      <div class="details">
        Phone: ${data.phone}<br>
        Booking ID: ${docSnap.id}
      </div>
    `;

    card.onclick = () => {
      const details = card.querySelector(".details");
      details.style.display = details.style.display === "block" ? "none" : "block";
    };

    if(data.status === "pending"){
      const cancelBtn = document.createElement("button");
      cancelBtn.classList.add("cancel-btn");
      cancelBtn.innerText = "Cancel Booking";
      cancelBtn.onclick = async (e) => {
        e.stopPropagation();
        await updateDoc(doc(db,"bookings",docSnap.id),{status:"cancelled"});
        loadBookings();
      };
      card.appendChild(cancelBtn);
    }

    if(["pending","assigned","in_progress"].includes(data.status)){
      activeDiv.appendChild(card);
      activeCount++;
    } else {
      historyDiv.appendChild(card);
      historyCount++;
    }

  });

  document.getElementById("activeCount").innerText = activeCount + " active booking(s)";
  document.getElementById("historyCount").innerText = historyCount + " completed / cancelled";
}
</script>

<script type="module" src="./components/menu.js"></script>

</body>
</html>
