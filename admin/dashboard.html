<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{margin:0;font-family:'Segoe UI';background:#f3f6fb;}
    .admin-header{
      background:#4f46e5;color:white;
      padding:15px 25px;
      display:flex;justify-content:space-between;align-items:center;
    }
    .admin-right{display:flex;align-items:center;gap:15px;}
    .admin-right button{
      background:white;color:#4f46e5;
      border:none;padding:6px 12px;border-radius:6px;cursor:pointer;
    }
    .container{max-width:1000px;margin:40px auto;padding:20px;}
    .card{
      background:white;padding:25px;border-radius:12px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);margin-bottom:25px;
    }
    .nav-buttons{display:flex;gap:20px;flex-wrap:wrap;}
    .nav-buttons button{
      background:#4f46e5;color:white;
      border:none;padding:12px 18px;border-radius:8px;cursor:pointer;
    }
  </style>
</head>
<body>

<div class="admin-header">
  <div>Gigto Admin</div>
  <div class="admin-right">
    <span id="adminName"></span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Control Panel</h2>
    <div class="nav-buttons">
      <button onclick="goBookings()">Manage Bookings</button>
      <button onclick="goWorkers()">Manage Workers</button>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "../firebase.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

onAuthStateChanged(auth, async(user)=>{
  if(!user){ window.location.href="../auth.html"; return; }

  const snap=await getDoc(doc(db,"admins",user.uid));
  if(!snap.exists() || snap.data().status!=="active"){
    await signOut(auth);
    window.location.href="../auth.html";
    return;
  }

  document.getElementById("adminName").innerText=user.email;
});

window.logout=async()=>{
  await signOut(auth);
  window.location.href="../auth.html";
};

window.goBookings=()=>window.location.href="managebookings.html";
window.goWorkers=()=>window.location.href="viewgigs.html";
</script>

</body>
</html>
