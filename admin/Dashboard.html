<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background:#f3f6fb;
    }

    .container {
      max-width:900px;
      margin:40px auto;
      padding:20px;
    }

    .card {
      background:white;
      padding:25px;
      border-radius:14px;
      box-shadow:0 6px 20px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    input, select {
      width:100%;
      padding:10px;
      margin-bottom:12px;
      border-radius:8px;
      border:1px solid #ddd;
    }

    button {
      padding:10px 18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-right:10px;
      font-weight:500;
    }

    .primary { background:#4f46e5; color:white; }
    .secondary { background:#e5e7eb; }
    .danger { background:#dc2626; color:white; }

    h2 { margin-bottom:5px; }
    .subtitle { color:#555; margin-bottom:20px; }
  </style>
</head>

<body>

<div class="container">

  <h2>Admin Dashboard</h2>
  <p class="subtitle" id="roleInfo"></p>

  <div class="card">
    <button class="secondary" onclick="goView()">View Workers</button>
    <button class="danger" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3 id="formTitle">Create Gig Worker</h3>

    <input type="text" id="name" placeholder="Worker Name">
    <input type="text" id="contact" placeholder="Contact Number">
    <input type="text" id="aadhaar" placeholder="Aadhaar (Optional)">

    <select id="gigType">
      <option value="Plumber">Plumber</option>
      <option value="Electrician">Electrician</option>
    </select>

    <input type="text" id="address" placeholder="Address">
    <input type="text" id="emergencyPhone" placeholder="Emergency Phone (Optional)">

    <button class="primary" onclick="saveWorker()">Save Worker</button>
  </div>

</div>

<script type="module">
import { auth, db } from "../firebase.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, addDoc, updateDoc, collection }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;
let currentRole;

const urlParams = new URLSearchParams(window.location.search);
const editId = urlParams.get("edit");

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  const adminDoc = await getDoc(doc(db,"admins",user.uid));

  if (!adminDoc.exists()) {
    alert("Not authorized");
    await signOut(auth);
    window.location.href = "login.html";
    return;
  }

  currentRole = adminDoc.data().role;
  document.getElementById("roleInfo").innerText =
    "Role: " + currentRole;
});

window.saveWorker = async function () {

  const name = name.value;
  const contact = contact.value;
  const address = address.value;

  if (!name || !contact || !address) {
    alert("Fill required fields");
    return;
  }

  await addDoc(collection(db,"gig_workers"),{
    name,
    contact,
    gigType: gigType.value,
    address,
    status:"active",
    adminId: currentUser.uid,
    createdByEmail: currentUser.email,
    createdAt: new Date()
  });

  alert("Worker Created!");
  window.location.href="Viewgigs.html";
};

window.logout = async function () {
  await signOut(auth);
  window.location.href="login.html";
};

window.goView = function () {
  window.location.href="Viewgigs.html";
};
</script>

</body>
</html>
