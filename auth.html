<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Register - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>

<div class="container">

  <div class="card">
    <h2 id="formTitle">Login</h2>

    <!-- Register Fields -->
    <div id="registerFields" class="hidden">
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="address" placeholder="Address in Kavali">
    </div>

    <input type="text" id="phone" placeholder="Phone Number">

    <div id="recaptcha-container"></div>

    <input type="text" id="otp" placeholder="Enter OTP" class="hidden">

    <button id="actionBtn" onclick="sendOTP()">Send OTP</button>

    <p style="margin-top:15px;">
      <span id="toggleText">New user?</span>
      <a href="#" onclick="toggleMode()">Register</a>
    </p>
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let confirmationResult;
let isRegister = false;

// Recaptcha
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
  size: 'normal'
});

// Toggle Login/Register
window.toggleMode = function(){
  isRegister = !isRegister;

  document.getElementById("formTitle").innerText = isRegister ? "Register" : "Login";
  document.getElementById("registerFields").classList.toggle("hidden");
  document.getElementById("toggleText").innerText = isRegister ? "Already have account?" : "New user?";
  document.getElementById("actionBtn").innerText = "Send OTP";
  document.getElementById("otp").classList.add("hidden");
};

// Send OTP
window.sendOTP = async function(){

  const phone = "+91" + document.getElementById("phone").value.trim();

  confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);

  document.getElementById("otp").classList.remove("hidden");
  document.getElementById("actionBtn").innerText = "Verify OTP";
  window.sendOTP = verifyOTP;
};

// Verify OTP
async function verifyOTP(){

  const otp = document.getElementById("otp").value.trim();
  const result = await confirmationResult.confirm(otp);

  const user = result.user;

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if(isRegister){
    const name = document.getElementById("name").value.trim();
    const address = document.getElementById("address").value.trim();

    if(!name || !address){
      alert("Name and address required");
      return;
    }

    await setDoc(userRef,{
      name,
      address,
      phone: user.phoneNumber,
      createdAt: new Date()
    });
  } else {
    if(!snap.exists()){
      alert("User not found. Please register.");
      return;
    }
  }

  // Redirect back
  const redirect = localStorage.getItem("redirectAfterLogin");
