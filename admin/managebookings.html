<!DOCTYPE html>
<html>
<head>
<title>Manage Bookings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:'Segoe UI';background:#f3f6fb;}
.container{max-width:1100px;margin:20px auto;padding:15px;}

.section-title{
  font-size:18px;
  font-weight:600;
  margin-bottom:15px;
}

.booking-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:15px;
}

.booking-card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:8px;
}

.pending{background:#fef3c7;color:#92400e;}
.assigned{background:#dbeafe;color:#1e40af;}
.in_progress{background:#e0e7ff;color:#3730a3;}
.completed{background:#dcfce7;color:#166534;}
.cancelled{background:#fee2e2;color:#991b1b;}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
  margin-top:6px;
  margin-right:4px;
}

.primary{background:#4f46e5;color:white;}
.danger{background:#dc2626;color:white;}
.secondary{background:#e5e7eb;}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

input, select{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-right:10px;
  margin-bottom:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

th{
  background:#4f46e5;
  color:white;
}

.free{color:green;font-weight:600;}
.busy{color:red;font-weight:600;}
</style>
</head>

<body>

<div class="container">

<div class="section-title">Open Bookings</div>
<div class="booking-grid" id="bookingList"></div>

<div class="card">
<div class="section-title">Workers</div>

<input id="searchWorker" placeholder="Search worker name..." oninput="renderWorkers()">
<select id="availabilityFilter" onchange="renderWorkers()">
  <option value="all">All</option>
  <option value="free">Free</option>
  <option value="busy">Busy</option>
</select>

<div id="workerStats"></div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Service</th>
<th>Status</th>
</tr>
</thead>
<tbody id="workerList"></tbody>
</table>

</div>

</div>

<script type="module">

import { auth, db } from "../firebase.js";
import { renderAdminHeader } from "./admin-menu.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, doc, getDoc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser,currentRole,workers=[],bookings=[];

onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href="../auth.html";return;}
  currentUser=user;

  const snap=await getDoc(doc(db,"admins",user.uid));
  if(!snap.exists()||snap.data().status!=="active"){
    await signOut(auth);
    window.location.href="../auth.html";
    return;
  }

  currentRole=snap.data().role;
  renderAdminHeader(user.email);
  loadData();
});

async function loadData(){
  workers=[]; bookings=[];

  const workerSnap=await getDocs(collection(db,"gig_workers"));
  workerSnap.forEach(docSnap=>{
    const data=docSnap.data();
    if(currentRole==="admin" && data.adminId!==currentUser.uid) return;
    workers.push({id:docSnap.id,...data});
  });

  const bookingSnap=await getDocs(collection(db,"bookings"));
  bookingSnap.forEach(docSnap=>{
    bookings.push({id:docSnap.id,...docSnap.data()});
  });

  renderWorkers();
  renderBookings();
}

/* ================= WORKERS ================= */

window.renderWorkers = function(){

  const list=document.getElementById("workerList");
  const search=document.getElementById("searchWorker").value.toLowerCase();
  const filter=document.getElementById("availabilityFilter").value;

  list.innerHTML="";

  let freeCount=0;

  workers.forEach(worker=>{

    const busy=bookings.some(b=>
      b.assignedWorkerId===worker.id &&
      ["assigned","in_progress"].includes((b.status||"").toLowerCase())
    );

    const statusText = busy?"Busy":"Free";

    if(!busy && worker.status==="active") freeCount++;

    if(search && !worker.name.toLowerCase().includes(search)) return;
    if(filter==="free" && busy) return;
    if(filter==="busy" && !busy) return;

    list.innerHTML+=`
      <tr>
        <td>${worker.name}</td>
        <td>${worker.gigType}</td>
        <td class="${busy?"busy":"free"}">${statusText}</td>
      </tr>
    `;
  });

  document.getElementById("workerStats").innerText =
    "Available Workers: "+freeCount+" / "+workers.length;
}

/* ================= BOOKINGS (BOX UX) ================= */

function renderBookings(){

  const list=document.getElementById("bookingList");
  list.innerHTML="";

  bookings
  .filter(b=>["pending","assigned","in_progress"].includes((b.status||"").toLowerCase()))
  .forEach(booking=>{

    let workerOptions = workers.filter(worker=>{
      const busy=bookings.some(b=>
        b.assignedWorkerId===worker.id &&
        ["assigned","in_progress"].includes((b.status||"").toLowerCase())
      );

      const sameService =
        (worker.gigType||"").toLowerCase() ===
        (booking.serviceType||"").toLowerCase();

      return !busy && worker.status==="active" && sameService;
    });

    let actions="";

    if(booking.status==="pending"){
      actions += `
        <select onchange="assignWorker('${booking.id}',this.value)">
          <option value="">Assign Worker</option>
          ${workerOptions.map(w=>`<option value="${w.id}">${w.name}</option>`).join("")}
        </select>
        <button class="danger" onclick="cancelBooking('${booking.id}')">Cancel</button>
      `;
    }

    if(booking.status==="assigned"){
      actions += `
        <button class="primary" onclick="startWork('${booking.id}')">Start</button>
        <button class="danger" onclick="cancelBooking('${booking.id}')">Cancel</button>
      `;
    }

    if(booking.status==="in_progress"){
      actions += `
        <button class="primary" onclick="markCompleted('${booking.id}')">Complete</button>
      `;
    }

    list.innerHTML+=`
      <div class="booking-card">
        <div class="badge ${booking.status}">
          ${booking.status.toUpperCase()}
        </div>
        <div><b>Service:</b> ${booking.serviceType}</div>
        ${actions}
      </div>
    `;
  });
}

/* ================= ACTIONS ================= */

window.assignWorker=async function(id,workerId){
  if(!workerId)return;
  await updateDoc(doc(db,"bookings",id),{
    assignedWorkerId:workerId,
    status:"assigned",
    updatedAt:new Date()
  });
  loadData();
};

window.startWork=async function(id){
  await updateDoc(doc(db,"bookings",id),{
    status:"in_progress",
    updatedAt:new Date()
  });
  loadData();
};

window.markCompleted=async function(id){
  await updateDoc(doc(db,"bookings",id),{
    status:"completed",
    updatedAt:new Date()
  });
  loadData();
};

window.cancelBooking=async function(id){
  await updateDoc(doc(db,"bookings",id),{
    status:"cancelled",
    assignedWorkerId:null,
    updatedAt:new Date()
  });
  loadData();
};

</script>

</body>
</html>
