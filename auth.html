<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gigto Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:25px;
  width:320px;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#4338ca;
}

.tab{
  display:flex;
  margin-bottom:15px;
}

.tab button{
  flex:1;
  background:#eee;
  color:black;
}

.tab .active{
  background:#4f46e5;
  color:white;
}

.hidden{
  display:none;
}

#recaptcha-container{
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">

<h2 id="title">User Login</h2>

<!-- ROLE SWITCH -->
<div class="tab">
  <button id="userTab" class="active">User</button>
  <button id="adminTab">Admin</button>
</div>

<!-- USER SECTION -->
<div id="userSection">

  <!-- LOGIN / REGISTER SWITCH -->
  <div class="tab">
    <button id="loginTab" class="active">Login</button>
    <button id="registerTab">Register</button>
  </div>

  <!-- REGISTER EXTRA FIELDS -->
  <div id="registerFields" class="hidden">
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="address" placeholder="Address">
  </div>

  <input type="text" id="phone" placeholder="10 Digit Phone Number">
  <div id="recaptcha-container"></div>
  <input type="text" id="otp" placeholder="Enter OTP" class="hidden">
  <button id="phoneBtn">Send OTP</button>

</div>

<!-- ADMIN SECTION -->
<div id="adminSection" class="hidden">
  <input type="email" id="email" placeholder="Admin Email">
  <input type="password" id="password" placeholder="Password">
  <button id="adminBtn">Login</button>
</div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  RecaptchaVerifier,
  signInWithPhoneNumber,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let confirmationResult = null;
let recaptchaVerifier;
let isRegister = false;

/* ROLE SWITCH */
const userTab = document.getElementById("userTab");
const adminTab = document.getElementById("adminTab");
const userSection = document.getElementById("userSection");
const adminSection = document.getElementById("adminSection");
const title = document.getElementById("title");

userTab.onclick = ()=>{
  userTab.classList.add("active");
  adminTab.classList.remove("active");
  userSection.classList.remove("hidden");
  adminSection.classList.add("hidden");
  title.innerText="User Login";
};

adminTab.onclick = ()=>{
  adminTab.classList.add("active");
  userTab.classList.remove("active");
  adminSection.classList.remove("hidden");
  userSection.classList.add("hidden");
  title.innerText="Admin Login";
};

/* LOGIN / REGISTER SWITCH */
const loginTab = document.getElementById("loginTab");
const registerTab = document.getElementById("registerTab");
const registerFields = document.getElementById("registerFields");

loginTab.onclick = ()=>{
  isRegister=false;
  loginTab.classList.add("active");
  registerTab.classList.remove("active");
  registerFields.classList.add("hidden");
};

registerTab.onclick = ()=>{
  isRegister=true;
  registerTab.classList.add("active");
  loginTab.classList.remove("active");
  registerFields.classList.remove("hidden");
};

/* RECAPTCHA */
window.addEventListener("load", ()=>{
  recaptchaVerifier = new RecaptchaVerifier(auth,"recaptcha-container",{size:"normal"});
});

/* USER PHONE FLOW */
document.getElementById("phoneBtn").onclick = async ()=>{

  const phoneInput = document.getElementById("phone").value.trim();

  if(phoneInput.length!==10){
    alert("Enter valid phone number");
    return;
  }

  const phone="+91"+phoneInput;

  if(!confirmationResult){

    confirmationResult = await signInWithPhoneNumber(auth,phone,recaptchaVerifier);

    document.getElementById("otp").classList.remove("hidden");
    document.getElementById("phoneBtn").innerText="Verify OTP";

  }else{

    const otp=document.getElementById("otp").value.trim();
    const result = await confirmationResult.confirm(otp);
    await handleUser(result.user);
  }
};

/* ADMIN LOGIN */
document.getElementById("adminBtn").onclick = async ()=>{
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  try{
    const cred = await signInWithEmailAndPassword(auth,email,password);

    const adminSnap = await getDoc(doc(db,"admins",cred.user.uid));

    if(!adminSnap.exists()){
      alert("Not an admin account");
      return;
    }

    window.location.href="admin/managebookings.html";

  }catch{
    alert("Invalid admin login");
  }
};

/* USER HANDLER */
async function handleUser(user){

  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);

  if(isRegister){

    if(userSnap.exists()){
      alert("Already registered. Please login.");
      return;
    }

    const name=document.getElementById("name").value.trim();
    const address=document.getElementById("address").value.trim();

    if(!name || !address){
      alert("Name and Address required");
      return;
    }

    await setDoc(userRef,{
      name,
      address,
      phone:user.phoneNumber,
      createdAt:new Date()
    });

    window.location.href="my-bookings.html";
    return;
  }

  if(!userSnap.exists()){
    alert("User not registered. Please register.");
    return;
  }

  window.location.href="my-bookings.html";
}
</script>

</body>
</html>
