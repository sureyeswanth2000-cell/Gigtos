<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:'Segoe UI'; background:#f3f6fb; }
    .container { max-width:1000px; margin:40px auto; padding:20px; }
    .card {
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }
    input, select {
      width:100%;
      padding:10px;
      margin-bottom:12px;
      border-radius:8px;
      border:1px solid #ddd;
    }
    button {
      padding:8px 14px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-right:6px;
    }
    .primary{background:#4f46e5;color:white;}
    .danger{background:#dc2626;color:white;}
    .secondary{background:#e5e7eb;}
  </style>
</head>

<body>

<div class="container">

<h2>Admin Dashboard</h2>
<p id="roleInfo"></p>

<div class="card">
<button onclick="goView()">View Workers</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Create Worker</h3>
<input id="name" placeholder="Worker Name">
<input id="contact" placeholder="Contact">
<select id="gigType">
<option>Plumber</option>
<option>Electrician</option>
</select>
<input id="address" placeholder="Address">
<button class="primary" onclick="createWorker()">Create Worker</button>
</div>

<div class="card" id="adminSection" style="display:none;">
<h3>Create Admin</h3>
<input id="adminEmail" placeholder="Admin Email">
<select id="adminRole">
<option value="admin">Admin</option>
<option value="superadmin">Superadmin</option>
</select>
<button class="primary" onclick="createAdmin()">Create Admin</button>

<h3>Admins List</h3>
<div id="adminList"></div>
</div>

</div>

<script type="module">
import { auth, db } from "../firebase.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, addDoc, collection, getDocs, deleteDoc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;
let currentRole;

onAuthStateChanged(auth, async(user)=>{
  if(!user){ window.location.href="login.html"; return;}
  currentUser=user;

  const snap=await getDoc(doc(db,"admins",user.uid));
  if(!snap.exists()){ alert("Not authorized"); return;}

  currentRole=snap.data().role;
  document.getElementById("roleInfo").innerText="Role: "+currentRole;

  if(currentRole==="superadmin"){
    document.getElementById("adminSection").style.display="block";
    loadAdmins();
  }
});

window.createWorker=async function(){
  await addDoc(collection(db,"gig_workers"),{
    name:name.value,
    contact:contact.value,
    gigType:gigType.value,
    address:address.value,
    status:"active",
    adminId:currentUser.uid,
    createdAt:new Date()
  });
  alert("Worker Created");
};

window.createAdmin=async function(){
  await addDoc(collection(db,"admins"),{
    email:adminEmail.value,
    role:adminRole.value,
    createdAt:new Date()
  });
  alert("Admin Created");
  loadAdmins();
};

async function loadAdmins(){
  const snap=await getDocs(collection(db,"admins"));
  const list=document.getElementById("adminList");
  list.innerHTML="";
  snap.forEach(docSnap=>{
    const data=docSnap.data();
    list.innerHTML+=`
      <div style="margin-bottom:8px;">
        ${data.email} - ${data.role}
        <button onclick="deleteAdmin('${docSnap.id}')">Delete</button>
      </div>
    `;
  });
}

window.deleteAdmin=async function(id){
  if(confirm("Delete Admin?")){
    await deleteDoc(doc(db,"admins",id));
    loadAdmins();
  }
};

window.logout=async function(){
  await signOut(auth);
  window.location.href="login.html";
};

window.goView=function(){
  window.location.href="viewgigs.html";
};
</script>

</body>
</html>
