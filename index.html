<!DOCTYPE html>
<html>
<head>
  <title>Gigto – Home Services in Kavali</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #222;
    }

    header {
      background: linear-gradient(90deg, #4f46e5, #06b6d4);
      padding: 15px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-icon { font-size: 22px; cursor: pointer; }
    .logo { font-size: 20px; font-weight: bold; cursor: pointer; }
    .profile { font-size: 13px; cursor: pointer; }

    .hero {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .search-box {
      margin: 20px auto;
      max-width: 400px;
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    .services {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      text-align: center;
    }

    .price {
      background: #e0f2fe;
      color: #0284c7;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      display: inline-block;
      margin: 10px 0;
    }

    .book-btn {
      background: #4f46e5;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      display: inline-block;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #666;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <div class="menu-icon" onclick="openMenu()">☰</div>
  <div class="logo" onclick="goHome()">Gigto</div>
  <div id="profileSection" class="profile"></div>
</header>

<div class="hero">
  <h1>Home Services in Kavali</h1>
  <p>Book trusted professionals at just ₹200 visiting charge</p>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search service" oninput="filterServices()">
</div>

<div class="services">

  <div class="card" data-name="plumber">
    <h3>🧰 Plumber</h3>
    <div class="price">₹200 Visiting Charge</div><br>
    <a href="service.html?type=Plumber" class="book-btn">Book</a>
  </div>

  <div class="card" data-name="electrician">
    <h3>⚡ Electrician</h3>
    <div class="price">₹200 Visiting Charge</div><br>
    <a href="service.html?type=Electrician" class="book-btn">Book</a>
  </div>

</div>

<footer>
  © 2026 Gigto – Home Services in Kavali
</footer>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.goHome = function() {
  window.location.href = "index.html";
};

window.filterServices = function() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const name = card.getAttribute("data-name");
    card.style.display = name.includes(input) ? "block" : "none";
  });
};

onAuthStateChanged(auth, async (user) => {
  const profile = document.getElementById("profileSection");

  if (user) {
    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    let displayName = user.phoneNumber;
    if (snap.exists() && snap.data().name) {
      displayName = snap.data().name;
    }

    profile.innerText = "👤 " + displayName;
    profile.onclick = () => window.location.href = "profile.html";
  }
});
</script>

<script type="module" src="./components/menu.js"></script>

</body>
</html>
