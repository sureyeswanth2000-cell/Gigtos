<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:'Segoe UI';
      background:#f3f6fb;
    }

    .container{
      max-width:1100px;
      margin:40px auto;
      padding:20px;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .stat-box{
      background:#4f46e5;
      color:white;
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .stat-box h3{
      margin:0;
      font-size:28px;
    }

    .stat-box p{
      margin:5px 0 0;
      font-size:14px;
      opacity:0.9;
    }

    .nav-buttons{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .nav-buttons button{
      background:#4f46e5;
      color:white;
      border:none;
      padding:12px 18px;
      border-radius:8px;
      cursor:pointer;
    }

    .nav-buttons button:hover{
      opacity:0.9;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- STATS -->
  <div class="stats">
    <div class="stat-box">
      <h3 id="totalWorkers">0</h3>
      <p>Total Workers</p>
    </div>

    <div class="stat-box">
      <h3 id="freeWorkers">0</h3>
      <p>Available Workers</p>
    </div>

    <div class="stat-box">
      <h3 id="openBookings">0</h3>
      <p>Open Bookings</p>
    </div>

    <div class="stat-box">
      <h3 id="completedToday">0</h3>
      <p>Completed Today</p>
    </div>
  </div>

  <!-- NAVIGATION -->
  <div class="card">
    <h2>Control Panel</h2>
    <div class="nav-buttons">
      <button onclick="goBookings()">Manage Bookings</button>
      <button onclick="goWorkers()">Manage Workers</button>
    </div>
  </div>

</div>

<script type="module">

import { auth, db } from "../firebase.js";
import { renderAdminHeader } from "./admin-menu.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, collection, getDocs, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;
let currentRole;

onAuthStateChanged(auth, async(user)=>{

  if(!user){
    window.location.href="../auth.html";
    return;
  }

  currentUser = user;

  const snap = await getDoc(doc(db,"admins",user.uid));

  if(!snap.exists() || snap.data().status!=="active"){
    await signOut(auth);
    window.location.href="../auth.html";
    return;
  }

  currentRole = snap.data().role;

  renderAdminHeader(user.email);

  loadDashboardStats();
  // real-time updates
  onSnapshot(collection(db,"gig_workers"), loadDashboardStats);
  onSnapshot(collection(db,"bookings"), loadDashboardStats);
});


async function loadDashboardStats(){
  const workerSnap = await getDocs(collection(db,"gig_workers"));
  const bookingSnap = await getDocs(collection(db,"bookings"));

  let workers = [];
  let bookings = [];

  workerSnap.forEach(docSnap=>{
    const data = docSnap.data();

    if(currentRole==="admin" && data.adminId!==currentUser.uid) return;

    workers.push({id:docSnap.id,...data});
  });

  bookingSnap.forEach(docSnap=>{
    bookings.push({id:docSnap.id,...docSnap.data()});
  });

  // TOTAL WORKERS
  document.getElementById("totalWorkers").innerText = workers.length;

  // FREE WORKERS
  const freeWorkers = workers.filter(worker=>{
    const busy = bookings.some(b=>
      b.assignedWorkerId===worker.id &&
      ["assigned","in_progress"].includes((b.status||"").toLowerCase())
    );
    return !busy && worker.status==="active";
  }).length;

  document.getElementById("freeWorkers").innerText = freeWorkers;

  // OPEN BOOKINGS
  const openBookings = bookings.filter(b=>
    ["pending","assigned","in_progress"].includes((b.status||"").toLowerCase())
  ).length;

  document.getElementById("openBookings").innerText = openBookings;

  // COMPLETED TODAY
  const today = new Date();
  today.setHours(0,0,0,0);

  const completedToday = bookings.filter(b=>{
    if((b.status||"").toLowerCase() !== "completed") return false;
    if(!b.updatedAt) return false;
    return b.updatedAt.toDate() >= today;
  }).length;

  document.getElementById("completedToday").innerText = completedToday;
}


window.goBookings = ()=> window.location.href="managebookings.html";
window.goWorkers = ()=> window.location.href="viewgigs.html";

</script>

</body>
</html>
