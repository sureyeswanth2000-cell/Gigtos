<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Service - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>

<div id="header-placeholder"></div>

<div class="container">

  <div class="card">
    <h2 id="serviceTitle"></h2>
    <p>₹200 Visiting Charge</p>
  </div>

  <div class="card" id="bookingSection">
    <input type="text" id="customerName" placeholder="Your Name">
    <input type="text" id="address" placeholder="Your Address">
    <button onclick="confirmBooking()">Confirm Booking</button>
  </div>

</div>

<div id="footer-placeholder"></div>

<!-- Header + Footer -->
<script type="module">
import { renderHeader } from "./components/header.js";
import { renderFooter } from "./components/footer.js";
import { initModal } from "./components/modal.js";

renderHeader();
renderFooter();
initModal();
</script>

<!-- Booking Logic -->
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from 
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, addDoc, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser = null;

const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type") || "Service";
document.getElementById("serviceTitle").innerText = serviceType;

// Detect login state (NO redirect)
onAuthStateChanged(auth, async (user) => {

  currentUser = user;

  if (!user) return;

  // Auto-fill profile
  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (snap.exists()) {
    const data = snap.data();
    document.getElementById("customerName").value = data.name || "";
    document.getElementById("address").value = data.address || "";
  }
});

window.confirmBooking = async function(){

  const name = document.getElementById("customerName").value.trim();
  const address = document.getElementById("address").value.trim();

  if(!name || !address){
    alert("Please fill all details");
    return;
  }

  if(!currentUser){
  localStorage.setItem("redirectAfterLogin", window.location.href);
  window.location.href = "auth.html";
  return;
  }

  openModal("Confirm booking for ₹200?", async () => {

    await addDoc(collection(db,"bookings"),{
      userId: currentUser.uid,
      serviceType,
      customerName: name,
      address,
      phone: currentUser.phoneNumber,
      status: "pending",
      createdAt: new Date()
    });

    window.location.href="my-bookings.html";
  });
};
</script>

</body>
</html>
