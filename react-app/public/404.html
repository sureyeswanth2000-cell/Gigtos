<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gigto React App</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script redirects 404s back to index.html, preserving the path.
      // pathSegmentsToKeep = 1 keeps the /Gigtos repo prefix in the redirect.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/' +
          l.pathname.slice(1).split('/').slice(0, pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
