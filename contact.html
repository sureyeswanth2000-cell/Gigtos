<!DOCTYPE html>
<html>
<head>
  <title>Contact - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background:#f3f6fb;
    }

    header {
      background: linear-gradient(90deg,#4f46e5,#06b6d4);
      padding:15px;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .menu-icon { font-size:22px; cursor:pointer; }
    .logo { font-weight:bold; font-size:18px; cursor:pointer; }

    .container {
      max-width:500px;
      margin:auto;
      padding:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
      margin-bottom:20px;
      text-align:center;
    }

    h2 { margin-bottom:10px; }

    .btn {
      display:block;
      padding:12px;
      border-radius:10px;
      margin-top:10px;
      text-decoration:none;
      font-weight:500;
    }

    .whatsapp { background:#25D366; color:white; }
    .call { background:#2563eb; color:white; }

  </style>
</head>

<body>

<header>
  <div class="menu-icon" onclick="openMenu()">☰</div>
  <div class="logo" onclick="goHome()">Gigto</div>
</header>

<div class="container">

  <div class="card">
    <h2>Contact Gigto</h2>
    <p>Home Services in Kavali</p>
    <p><strong>Location:</strong> Kavali, Andhra Pradesh</p>

    <a href="tel:+919999999999" class="btn call">📞 Call Us</a>
    <a href="https://wa.me/919999999999" class="btn whatsapp">💬 WhatsApp Us</a>

  </div>

</div>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

<script type="module" src="./components/menu.js"></script>

</body>
</html>
