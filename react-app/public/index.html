<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gigto React App</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // Restores the original URL from the query string set by 404.html redirect.
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        });
        var basePath = l.pathname.split('/').slice(0, 2).join('/');
        var newSearch = decoded.slice(1).length ? '?' + decoded.slice(1).join('&') : '';
        window.history.replaceState(
          null, null,
          basePath + decoded[0] + newSearch + l.hash
        );
      }
    }(window.location));
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
