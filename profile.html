<!DOCTYPE html>
<html>
<head>
  <title>Profile - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background:#f3f6fb;
    }

    header {
      background: linear-gradient(90deg,#4f46e5,#06b6d4);
      padding:15px;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .menu-icon { font-size:22px; cursor:pointer; }
    .logo { font-weight:bold; font-size:18px; cursor:pointer; }
    .profile { font-size:13px; }

    .container {
      max-width:500px;
      margin:auto;
      padding:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
      margin-bottom:20px;
    }

    h2 {
      margin-bottom:15px;
    }

    input {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ddd;
      margin-bottom:12px;
      font-size:14px;
    }

    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#4f46e5;
      color:white;
      font-size:15px;
      cursor:pointer;
    }

    button:hover {
      background:#4338ca;
    }

    .success {
      margin-top:10px;
      color:#16a34a;
      font-size:14px;
    }

  </style>
</head>

<body>

<header>
  <div class="menu-icon" onclick="openMenu()">☰</div>
  <div class="logo" onclick="goHome()">Gigto</div>
  <div id="profileSection" class="profile"></div>
</header>

<div class="container">

  <div class="card">
    <h2>My Profile</h2>

    <input type="text" id="phone" placeholder="Phone Number" disabled>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="address" placeholder="Address in Kavali">
    <input type="text" id="altPhone" placeholder="Alternate Phone (Optional)">

    <button onclick="saveProfile()">Save Changes</button>

    <div class="success hidden" id="successMsg">
      Profile Updated Successfully
    </div>
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;

window.goHome = () => window.location.href = "index.html";

onAuthStateChanged(auth, async (user) => {

  if (!user) return window.location.href = "index.html";

  currentUser = user;

  document.getElementById("profileSection").innerText = user.phoneNumber;
  document.getElementById("phone").value = user.phoneNumber;

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (snap.exists()) {
    const data = snap.data();
    document.getElementById("name").value = data.name || "";
    document.getElementById("address").value = data.address || "";
    document.getElementById("altPhone").value = data.altPhone || "";
  }
});

window.saveProfile = async function() {

  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const altPhone = document.getElementById("altPhone").value.trim();

  if (!name || !address) {
    alert("Name and Address required");
    return;
  }

  await setDoc(doc(db, "users", currentUser.uid), {
    phone: currentUser.phoneNumber,
    name,
    address,
    altPhone,
    updatedAt: new Date()
  }, { merge: true });

  document.getElementById("successMsg").classList.remove("hidden");

  setTimeout(() => {
    document.getElementById("successMsg").classList.add("hidden");
  }, 2000);
};

</script>

<script type="module" src="./components/menu.js"></script>

</body>
</html>
