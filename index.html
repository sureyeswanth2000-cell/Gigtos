<!DOCTYPE html>
<html>
<head>
  <title>Gigto – Home Services in Kavali</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #222;
    }

    header {
      background: linear-gradient(90deg, #4f46e5, #06b6d4);
      padding: 18px;
      color: white;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    .hero {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .hero h1 {
      font-size: 26px;
    }

    .search-box {
      margin: 20px auto;
      max-width: 400px;
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .services {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      text-align: center;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .price {
      background: #e0f2fe;
      color: #0284c7;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      display: inline-block;
      margin: 10px 0;
    }

    .book-btn {
      background: #4f46e5;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      display: inline-block;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #666;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  Gigto – Services in Kavali
</header>

<div class="hero">
  <h1>Home Services in Kavali</h1>
  <p>Book trusted professionals at just ₹200 visiting charge</p>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search service (Plumber, Electrician)" oninput="filterServices()">
</div>

<div class="services" id="servicesContainer">

  <div class="card" data-name="plumber">
    <div class="icon">🧰</div>
    <h3>Plumber</h3>
    <div class="price">₹200 Visiting Charge</div><br>
    <a href="service.html?type=Plumber" class="book-btn">Book Plumber</a>
  </div>

  <div class="card" data-name="electrician">
    <div class="icon">⚡</div>
    <h3>Electrician</h3>
    <div class="price">₹200 Visiting Charge</div><br>
    <a href="service.html?type=Electrician" class="book-btn">Book Electrician</a>
  </div>

</div>

<footer>
  © 2026 Gigto – Home Services in Kavali
</footer>

<script>
function filterServices() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const name = card.getAttribute("data-name");
    if (name.includes(input)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
