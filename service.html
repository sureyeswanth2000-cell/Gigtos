<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Service - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>

<div id="header-placeholder"></div>

<div class="container">

  <div class="card">
    <h2 id="serviceTitle"></h2>
    <p>₹200 Visiting Charge</p>
  </div>

  <div class="card hidden" id="bookingSection">
    <input type="text" id="customerName" placeholder="Your Name">
    <input type="text" id="address" placeholder="Your Address">
    <button onclick="confirmBooking()">Confirm Booking</button>
  </div>

</div>

<div id="footer-placeholder"></div>

<script type="module">
import { renderHeader } from "./components/header.js";
import { renderFooter } from "./components/footer.js";
import { initModal } from "./components/modal.js";

renderHeader();
renderFooter();
initModal();
</script>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;
const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type") || "Service";

document.getElementById("serviceTitle").innerText = serviceType;

onAuthStateChanged(auth,(user)=>{
  if(!user) return window.location.href="index.html";
  currentUser = user;
  document.getElementById("bookingSection").classList.remove("hidden");
});

window.confirmBooking = async function(){

  const name = document.getElementById("customerName").value.trim();
  const address = document.getElementById("address").value.trim();

  if(!name || !address) return alert("Fill all details");

  openModal("Confirm booking for ₹200?", async () => {

    await addDoc(collection(db,"bookings"),{
      userId: currentUser.uid,
      serviceType,
      customerName:name,
      address,
      phone: currentUser.phoneNumber,
      status:"pending",
      createdAt:new Date()
    });

    window.location.href="my-bookings.html";
  });
};
</script>

</body>
</html>
