<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Bookings - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>


<div id="header-placeholder"></div>

<div class="container">

  <div class="section-title">Active Bookings</div>
  <div class="count" id="activeCount"></div>
  <div id="activeBookings"></div>
  <div class="section-title">Completed Bookings</div>
  <div class="count" id="completedCount"></div>
  <div id="completedBookings"></div>

  <div class="section-title">Cancelled Bookings</div>
  <div class="count" id="cancelledCount"></div>
  <div id="cancelledBookings"></div>

</div>

<div id="footer-placeholder"></div>

<!-- Header + Footer -->
<script type="module">
import { renderHeader } from "./components/header.js";
import { renderFooter } from "./components/footer.js";
import { initModal } from "./components/modal.js";

renderHeader();
renderFooter();
initModal();
</script>

<!-- Booking Logic -->
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, doc, updateDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser = null;
let authChecked = false;


onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Please login first.");
    localStorage.setItem("redirectAfterLogin", window.location.href);
    window.location.href = "auth.html";
    return;
  }
  currentUser = user;
  loadBookings();
});

async function loadBookings() {
  const activeDiv = document.getElementById("activeBookings");
  const completedDiv = document.getElementById("completedBookings");
  const cancelledDiv = document.getElementById("cancelledBookings");

  activeDiv.innerHTML = "";

  let activeCount = 0;
  let completedCount = 0;
  let cancelledCount = 0;

  const q = query(
    collection(db,"bookings"),
    where("userId","==",currentUser.uid)
  );

  // real-time listener
  onSnapshot(q, (snapshot) => {
    renderSnapshot(snapshot);
  });
  return;


function renderSnapshot(snapshot) {
  const activeDiv = document.getElementById("activeBookings");
  const completedDiv = document.getElementById("completedBookings");
  const cancelledDiv = document.getElementById("cancelledBookings");

  activeDiv.innerHTML = "";
  completedDiv.innerHTML = "";
  cancelledDiv.innerHTML = "";

  let activeCount = 0;
  let completedCount = 0;
  let cancelledCount = 0;

  if(snapshot.empty){
    activeDiv.innerHTML = "<div class='empty'>No bookings found</div>";
    document.getElementById("activeCount").innerText = "0 active booking(s)";
    document.getElementById("completedCount").innerText = "0 completed";
    document.getElementById("cancelledCount").innerText = "0 cancelled";
    return;
  }

  // convert to array and sort
  const docs = [];
  snapshot.forEach(docSnap=> docs.push({id:docSnap.id,data:docSnap.data()}));
  docs.sort((a,b)=>{
    const ta = a.data.updatedAt?.seconds || 0;
    const tb = b.data.updatedAt?.seconds || 0;
    return tb - ta;
  });

  docs.forEach(item=>{
    const docSnap = {id:item.id};
    const data = item.data;

    const createdTime = data.createdAt?.seconds
      ? new Date(data.createdAt.seconds * 1000).toLocaleString()
      : "Time unavailable";

    const card = document.createElement("div");
    card.classList.add("card");

    if(["pending","assigned","in_progress","awaiting_confirmation"].includes(data.status)){
      card.classList.add("active-highlight");
    }

    const prettyStatus = data.status.replace(/_/g,' ').toUpperCase();
    card.innerHTML = `
      <div class="badge ${data.status}">${prettyStatus}</div>
      <div class="service">${data.serviceType}</div>
      <div class="address">${data.address}</div>
      <div class="time">${createdTime}</div>
      <div class="details">
        Phone: ${data.phone}<br>
        Booking ID: ${docSnap.id}
      </div>
    `;

    if(data.status === "awaiting_confirmation"){
      const note = document.createElement("div");
      note.style.marginTop = "10px";
      note.style.fontSize = "13px";
      note.style.color = "#d97706";
      note.innerText = "⏳ Waiting for your confirmation to complete the job.";
      card.appendChild(note);
    }

    card.onclick = () => {
      const details = card.querySelector(".details");
      details.style.display = 
        details.style.display === "block" ? "none" : "block";
    };

    // timeline information
    const timeline = document.createElement("div");
    timeline.classList.add("timeline");
    timeline.innerHTML = `
      <div class="line-item"><span>Created:</span> ${createdTime}</div>
      <div class="line-item"><span>Last&nbsp;update:</span> ${data.updatedAt?.seconds ? new Date(data.updatedAt.seconds*1000).toLocaleString() : "-"}</div>
    `;
    card.appendChild(timeline);

    if(data.status === "pending"){
      const cancelBtn = document.createElement("button");
      cancelBtn.classList.add("cancel-btn");
      cancelBtn.innerText = "Cancel Booking";
      cancelBtn.onclick = (e) => {
        e.stopPropagation();

        openModal("Are you sure you want to cancel this booking?", async () => {
          await updateDoc(doc(db,"bookings",docSnap.id),{
            status:"cancelled",
            assignedWorkerId:null,
            updatedAt:new Date()
          });
        });
      };
      card.appendChild(cancelBtn);
    }

    if(data.status === "awaiting_confirmation"){
      const confirmBtn = document.createElement("button");
      confirmBtn.classList.add("cancel-btn");
      confirmBtn.innerText = "Confirm Completion";
      confirmBtn.onclick = (e) => {
        e.stopPropagation();
        openModal("Have you received the service and want to mark this booking complete?", async () => {
          await updateDoc(doc(db,"bookings",docSnap.id),{
            status:"completed",
            updatedAt:new Date()
          });
        });
      };
      card.appendChild(confirmBtn);
    }

    if(["pending","assigned","in_progress","awaiting_confirmation"].includes(data.status)){
      activeDiv.appendChild(card);
      activeCount++;
    } else if(data.status === "completed"){
      completedDiv.appendChild(card);
      completedCount++;
    } else if(data.status === "cancelled"){
      cancelledDiv.appendChild(card);
      cancelledCount++;
    }
  });

  document.getElementById("activeCount").innerText =
    activeCount + " active booking(s)";
  document.getElementById("completedCount").innerText =
    completedCount + " completed";
  document.getElementById("cancelledCount").innerText =
    cancelledCount + " cancelled";
}
}</script>
 

</body>
</html>
