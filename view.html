<!DOCTYPE html>
<html>
<head>
  <title>View Workers</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="container">

  <h2>Gig Workers</h2>
  <p class="subtitle" id="roleInfo"></p>

  <div class="section">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search by name or phone"
      oninput="loadWorkers()"
    >

    <select id="filterType" onchange="loadWorkers()">
      <option value="all">All</option>
      <option value="Plumber">Plumber</option>
      <option value="Electrician">Electrician</option>
    </select>
  </div>

  <div id="workerList"></div>

  <div class="section">
    <button class="secondary" onclick="goDashboard()">Back to Dashboard</button>
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  collection, 
  getDocs, 
  doc, 
  getDoc, 
  query, 
  where, 
  updateDoc,
  orderBy 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;
let currentRole;

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const adminSnap = await getDoc(doc(db, "admins", user.uid));

  if (!adminSnap.exists()) {
    alert("Not authorized");
    window.location.href = "index.html";
    return;
  }

  currentRole = adminSnap.data().role;
  document.getElementById("roleInfo").innerText = "Role: " + currentRole;

  loadWorkers();
});

window.loadWorkers = async function () {

  const list = document.getElementById("workerList");
  list.innerHTML = "";

  const filter = document.getElementById("filterType").value;
  const searchText = document.getElementById("searchInput").value.trim().toLowerCase();

  let q;

  if (currentRole === "superadmin") {
    q = query(collection(db, "gig_workers"), orderBy("createdAt", "desc"));
  } else {
    q = query(
      collection(db, "gig_workers"),
      where("adminId", "==", currentUser.uid),
      orderBy("createdAt", "desc")
    );
  }

  const snapshot = await getDocs(q);

  if (snapshot.empty) {
    list.innerHTML = "<p>No workers found.</p>";
    return;
  }

  snapshot.forEach((docSnap) => {

    const data = docSnap.data();

    const name = data.name || "";
    const contact = data.contact || "";
    const gigType = data.gigType || "";
    const createdByEmail = data.createdByEmail || "";
    const status = (data.status || "active").toLowerCase();

    // Filter by gig type
    if (filter !== "all" && gigType !== filter) return;

    // Search filter
    if (
      searchText &&
      !name.toLowerCase().includes(searchText) &&
      !contact.includes(searchText)
    ) return;

    const badgeClass = status === "active" ? "active" : "inactive";

    const card = document.createElement("div");
    card.classList.add("worker-card");

    card.innerHTML = `
      <div class="worker-name">${name}</div>
      <div class="worker-meta">
        <span class="status-badge ${badgeClass}">
          ${status.toUpperCase()}
        </span><br>
        ${gigType} | 📞 ${contact}<br>
        Created By: ${createdByEmail}
      </div>
    `;

    const actions = document.createElement("div");
    actions.classList.add("worker-actions");

    // Edit button
    if (
      currentRole === "superadmin" ||
      (currentRole === "admin" && data.adminId === currentUser.uid)
    ) {
      const editBtn = document.createElement("button");
      editBtn.classList.add("secondary");
      editBtn.innerText = "Edit";
      editBtn.onclick = () => {
        window.location.href = "dashboard.html?edit=" + docSnap.id;
      };
      actions.appendChild(editBtn);
    }

    // Enable / Disable (Superadmin only)
    if (currentRole === "superadmin") {
      const toggleBtn = document.createElement("button");
      toggleBtn.classList.add(status === "active" ? "danger" : "primary");
      toggleBtn.innerText = status === "active" ? "Disable" : "Enable";

      toggleBtn.onclick = async () => {
        await updateDoc(doc(db, "gig_workers", docSnap.id), {
          status: status === "active" ? "inactive" : "active"
        });
        loadWorkers();
      };

      actions.appendChild(toggleBtn);
    }

    card.appendChild(actions);
    list.appendChild(card);
  });
};

window.goDashboard = function () {
  window.location.href = "dashboard.html";
};
</script>

</body>
</html>
