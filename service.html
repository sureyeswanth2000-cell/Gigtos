<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Service - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>

<!-- Header -->
<div id="header-placeholder"></div>

<div class="container">

  <!-- Service Title -->
  <div class="card">
    <h2 id="serviceTitle"></h2>
    <p>₹200 Visiting Charge</p>
  </div>

  <!-- Booking Section -->
  <div class="card" id="bookingSection">
    <input type="text" id="customerName" placeholder="Your Name">
    <input type="text" id="address" placeholder="Your Address">
    <button onclick="confirmBooking()">Confirm Booking</button>
  </div>

</div>

<!-- Footer -->
<div id="footer-placeholder"></div>

<!-- Header + Footer + Modal -->
<script type="module">
import { renderHeader } from "./components/header.js";
import { renderFooter } from "./components/footer.js";
import { initModal } from "./components/modal.js";

renderHeader();
renderFooter();
initModal();
</script>

<!-- Booking Logic -->
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, addDoc, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser = null;

// Get service type from URL
const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type") || "Service";
document.getElementById("serviceTitle").innerText = serviceType;

// Auth Check
onAuthStateChanged(auth, async (user) => {

  // If not logged in → redirect to login
  if (!user) {
    localStorage.setItem("redirectAfterLogin", window.location.href);
    window.location.href = "auth.html";
    return;
  }

  currentUser = user;

  // Auto-fill profile details
  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (snap.exists()) {
    const data = snap.data();
    document.getElementById("customerName").value = data.name || "";
    document.getElementById("address").value = data.address || "";
  }
});

// Confirm Booking
window.confirmBooking = async function(){

  const name = document.getElementById("customerName").value.trim();
  const address = document.getElementById("address").value.trim();

  if(!name || !address){
    alert("Please fill all details");
    return;
  }

  openModal("Confirm booking for ₹200?", async () => {

    await addDoc(collection(db,"bookings"),{
      userId: currentUser.uid,
      serviceType,
      customerName: name,
      address,
      phone: currentUser.phoneNumber,
      status: "pending",
      createdAt: new Date()
    });

    window.location.href = "my-bookings.html";
  });
};
</script>

</body>
</html>
