name: Test on Push

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ── Job 1: Script syntax validation ────────────────────────────────────────
  syntax:
    name: Validate Script Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check scripts directory exists
        id: check_scripts
        run: |
          if [ -d "scripts" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No scripts/ directory found – skipping syntax checks"
          fi

      - name: Validate shell script syntax
        if: steps.check_scripts.outputs.exists == 'true'
        run: |
          echo "Checking shell script syntax…"
          error_count=0
          for script in scripts/*.sh; do
            [ -f "$script" ] || continue
            if bash -n "$script" 2>&1; then
              echo "  ✓ $(basename $script) – OK"
            else
              echo "  ✗ $(basename $script) – SYNTAX ERROR"
              error_count=$((error_count + 1))
            fi
          done
          if [ $error_count -gt 0 ]; then
            echo "❌ ${error_count} script(s) have syntax errors"
            exit 1
          fi
          echo "✅ All scripts passed syntax check"

      - name: Validate GitHub Actions workflow YAML
        run: |
          echo "Checking workflow YAML files…"
          error_count=0
          for yml in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$yml" ] || continue
            if python3 -c "import yaml,sys; yaml.safe_load(open('$yml'))" 2>/dev/null; then
              echo "  ✓ $(basename $yml) – valid YAML"
            else
              echo "  ✗ $(basename $yml) – YAML parse error"
              error_count=$((error_count + 1))
            fi
          done
          if [ $error_count -gt 0 ]; then
            echo "❌ ${error_count} workflow file(s) have YAML errors"
            exit 1
          fi
          echo "✅ All workflow YAML files are valid"

  # ── Job 2: Unit tests (structural, no emulator) ────────────────────────────
  unit-tests:
    name: Structural Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Make scripts executable
        run: |
          if [ -d "scripts" ]; then
            chmod +x scripts/*.sh
          fi

      - name: Run structural tests
        env:
          FIREBASE_PROJECT_ID: demo-gigtos
          FIREBASE_EMULATOR: 'false'
          LOG_DIR: reports
        run: |
          if [ -f "scripts/test-booking.sh" ]; then
            bash scripts/test-booking.sh
          else
            echo "test-booking.sh not found – checking functions/index.js directly"
            if [ -f "functions/index.js" ]; then
              grep -q "exports.createBooking" functions/index.js && \
                echo "✅ createBooking export found" || \
                echo "❌ createBooking export NOT found"
            fi
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: reports/test-report-*.txt
          if-no-files-found: ignore

  # ── Job 3: Security checks ─────────────────────────────────────────────────
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets…"
          issues=0

          # Check for Google API keys
          if grep -rE "AIza[0-9A-Za-z_-]{35}" \
              --include="*.js" --include="*.ts" --include="*.json" \
              --exclude-dir=node_modules --exclude-dir=.git \
              . 2>/dev/null | grep -v ".example" | grep -q .; then
            echo "⚠️  Possible Google API key found in source"
            issues=$((issues + 1))
          fi

          # Check for GitHub tokens
          if grep -rE "ghp_[0-9A-Za-z]{36}" \
              --include="*.js" --include="*.ts" --include="*.sh" \
              --exclude-dir=node_modules --exclude-dir=.git \
              . 2>/dev/null | grep -v ".example" | grep -q .; then
            echo "⚠️  Possible GitHub PAT found in source"
            issues=$((issues + 1))
          fi

          # Check for open Firestore rules (if true)
          if [ -f "firebase.rules" ]; then
            if grep -q "allow read, write: if true" firebase.rules; then
              echo "⚠️  Firestore rules are open to everyone (allow read, write: if true)"
              issues=$((issues + 1))
            else
              echo "✅ Firestore rules do not have open access"
            fi
          fi

          # Check .env is not committed
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ .env file is tracked by git! Remove it immediately."
            issues=$((issues + 1))
          else
            echo "✅ .env is not committed to git"
          fi

          if [ $issues -gt 0 ]; then
            echo ""
            echo "Found ${issues} security issue(s) – please review"
            exit 1
          fi

          echo "✅ No obvious security issues detected"

      - name: Verify .gitignore protects secrets
        run: |
          required_ignores=(".env" "reports/" "*.log")
          missing=()
          for entry in "${required_ignores[@]}"; do
            if ! grep -qF "$entry" .gitignore 2>/dev/null; then
              missing+=("$entry")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "⚠️  .gitignore is missing entries: ${missing[*]}"
          else
            echo "✅ .gitignore contains all required entries"
          fi

  # ── Job 4: Comment on PR with results ──────────────────────────────────────
  pr-comment:
    name: Post PR Status
    runs-on: ubuntu-latest
    needs: [syntax, unit-tests, security]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build status comment
        id: comment
        run: |
          SYNTAX="${{ needs.syntax.result }}"
          TESTS="${{ needs.unit-tests.result }}"
          SECURITY="${{ needs.security.result }}"

          icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }

          BODY="## CI Check Results

          | Check | Status |
          |-------|--------|
          | Script Syntax | $(icon $SYNTAX) ${SYNTAX} |
          | Unit Tests | $(icon $TESTS) ${TESTS} |
          | Security | $(icon $SECURITY) ${SECURITY} |

          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.head_ref }}\`"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.comment.outputs.body }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('CI Check Results')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Write job summary
        run: |
          echo "## Test on Push Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Syntax | ${{ needs.syntax.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
