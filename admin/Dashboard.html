<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:'Segoe UI'; background:#f3f6fb; }
    .container { max-width:1200px; margin:40px auto; padding:20px; }
    .card {
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }
    input, select {
      width:100%;
      padding:10px;
      margin-bottom:12px;
      border-radius:8px;
      border:1px solid #ddd;
    }
    button {
      padding:8px 14px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-right:6px;
      margin-top:5px;
    }
    .primary{background:#4f46e5;color:white;}
    .danger{background:#dc2626;color:white;}
    .secondary{background:#e5e7eb;}
    .stats{display:flex;gap:20px;}
    .stat-box{
      flex:1;
      background:#4f46e5;
      color:white;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="container">

<h2>Super Admin Control Panel</h2>
<p id="roleInfo"></p>

<div class="stats">
  <div class="stat-box">
    <h3 id="totalWorkers">0</h3>
    <p>Total Workers</p>
  </div>
  <div class="stat-box">
    <h3 id="totalAdmins">0</h3>
    <p>Total Admins</p>
  </div>
</div>

<div class="card">
<button onclick="goView()">View Workers</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Create Worker</h3>
<input id="name" placeholder="Worker Name">
<input id="contact" placeholder="Contact">
<input id="aadhaar" placeholder="Aadhaar">
<input id="altContact" placeholder="Alternative Contact">
<select id="gigType">
<option>Plumber</option>
<option>Electrician</option>
</select>
<input id="address" placeholder="Address">
<button class="primary" onclick="createWorker()">Create Worker</button>
</div>

<div class="card" id="adminSection" style="display:none;">
<h3>Create Admin</h3>
<input id="adminEmail" placeholder="Admin Email">
<input id="adminPassword" type="password" placeholder="Password">
<select id="adminRole">
<option value="admin">Admin</option>
<option value="superadmin">Superadmin</option>
</select>
<button class="primary" onclick="createAdmin()">Create Admin</button>

<hr>

<h3>Admins List</h3>
<div id="adminList"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, sendPasswordResetEmail }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, setDoc, addDoc, collection, getDocs, deleteDoc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { auth, db } from "../firebase.js";

const secondaryApp = initializeApp(auth.app.options, "SecondaryApp");
const secondaryAuth = getAuth(secondaryApp);

let currentUser;
let currentRole;

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    window.location.href="login.html";
    return;
  }

  currentUser=user;

  const snap=await getDoc(doc(db,"admins",user.uid));
  if(!snap.exists()){
    alert("Not authorized");
    await signOut(auth);
    window.location.href="login.html";
    return;
  }

  // 🔐 Block inactive login
  if(snap.data().status !== "active"){
    alert("Your account is disabled.");
    await signOut(auth);
    window.location.href="login.html";
    return;
  }

  currentRole=snap.data().role;
  document.getElementById("roleInfo").innerText="Role: "+currentRole;

  if(currentRole==="superadmin"){
    document.getElementById("adminSection").style.display="block";
    loadAdmins();
    loadStats();
  }
});

// ================= STATS =================
async function loadStats(){
  const workers = await getDocs(collection(db,"gig_workers"));
  const admins = await getDocs(collection(db,"admins"));
  document.getElementById("totalWorkers").innerText = workers.size;
  document.getElementById("totalAdmins").innerText = admins.size;
}

// ================= CREATE ADMIN =================
window.createAdmin = async function(){

  if(!adminEmail.value || !adminPassword.value){
    alert("Email and Password required");
    return;
  }

  try{
    const cred = await createUserWithEmailAndPassword(
      secondaryAuth,
      adminEmail.value,
      adminPassword.value
    );

    await setDoc(doc(db,"admins",cred.user.uid),{
      email:adminEmail.value,
      role:adminRole.value,
      status:"active",
      createdAt:new Date()
    });

    await secondaryAuth.signOut();

    alert("Admin Created");
    adminEmail.value="";
    adminPassword.value="";

    loadAdmins();
    loadStats();

  }catch(error){
    alert(error.message);
  }
};

// ================= LOAD ADMINS =================
async function loadAdmins(){
  const snap=await getDocs(collection(db,"admins"));
  const list=document.getElementById("adminList");
  list.innerHTML="";

  snap.forEach(docSnap=>{
    const data=docSnap.data();
    const id=docSnap.id;

    list.innerHTML+=`
      <div style="padding:10px;background:#f9f9f9;margin-bottom:10px;border-radius:8px;">
        <b>${data.email}</b> (${data.role}) - ${data.status}
        <br><br>
        <button onclick="toggleAdmin('${id}','${data.status}')">
          ${data.status==="active"?"Disable":"Enable"}
        </button>
        <button onclick="resetPassword('${data.email}')">Reset Password</button>
        <button class="danger" onclick="deleteAdmin('${id}')">Delete</button>
      </div>
    `;
  });
}

// ================= ENABLE / DISABLE =================
window.toggleAdmin = async function(id,status){

  if(id === currentUser.uid){
    alert("You cannot disable your own account.");
    return;
  }

  try{
    await updateDoc(doc(db,"admins",id),{
      status: status==="active" ? "inactive" : "active"
    });

    alert("Status Updated");
    loadAdmins();
  }
  catch(error){
    alert(error.message);
  }
};

// ================= DELETE =================
window.deleteAdmin = async function(id){

  if(id === currentUser.uid){
    alert("You cannot delete your own account.");
    return;
  }

  if(!confirm("Delete Admin?")) return;

  try{
    await deleteDoc(doc(db,"admins",id));
    alert("Admin Deleted");
    loadAdmins();
    loadStats();
  }
  catch(error){
    alert(error.message);
  }
};

// ================= RESET PASSWORD =================
window.resetPassword = async function(email){
  try{
    await sendPasswordResetEmail(auth,email);
    alert("Password reset email sent.");
  }catch(error){
    alert(error.message);
  }
};

window.logout = async function(){
  await signOut(auth);
  window.location.href="login.html";
};

window.goView=function(){
  window.location.href="viewgigs.html";
};
</script>

</body>
</html>
