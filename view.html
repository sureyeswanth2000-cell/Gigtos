<!DOCTYPE html>
<html>
<head>
  <title>View Workers</title>
  <link rel="stylesheet" href="./styles.css">
  </head>
<body>

<div class="container">

  <h2>Gig Workers</h2>
  <p class="subtitle" id="roleInfo"></p>

  <div class="section">
    <select id="filterType" onchange="loadWorkers()">
      <option value="all">All</option>
      <option value="Plumber">Plumber</option>
      <option value="Electrician">Electrician</option>
    </select>
  </div>

  <div id="workerList"></div>

  <div class="section">
    <button class="secondary" onclick="goDashboard()">Back to Dashboard</button>
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, deleteDoc, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;
let currentRole;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const adminSnap = await getDoc(doc(db, "admins", user.uid));

  if (!adminSnap.exists()) {
    alert("Not authorized");
    window.location.href = "index.html";
    return;
  }

  currentRole = adminSnap.data().role;
  document.getElementById("roleInfo").innerText = "Role: " + currentRole;

  loadWorkers();
});

window.loadWorkers = async function () {
  const list = document.getElementById("workerList");
  list.innerHTML = "";

  const filter = document.getElementById("filterType").value;

  let q;

  if (currentRole === "superadmin") {
    q = collection(db, "gig_workers");
  } else {
    q = query(
      collection(db, "gig_workers"),
      where("adminId", "==", currentUser.uid)
    );
  }

  const snapshot = await getDocs(q);

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    if (filter !== "all" && data.gigType !== filter) return;

    const card = document.createElement("div");
    card.classList.add("worker-card");

    card.innerHTML = `
      <div class="worker-name">${data.name}</div>
      <div class="worker-meta">
        ${data.gigType} | 📞 ${data.contact}<br>
        Created By: ${data.createdByEmail}
      </div>
    `;

    const actions = document.createElement("div");
    actions.classList.add("worker-actions");

    if (
      currentRole === "superadmin" ||
      (currentRole === "admin" && data.adminId === currentUser.uid)
    ) {
      const editBtn = document.createElement("button");
      editBtn.classList.add("secondary");
      editBtn.innerText = "Edit";
      editBtn.onclick = () => {
        window.location.href = "dashboard.html?edit=" + docSnap.id;
      };
      actions.appendChild(editBtn);
    }

    if (currentRole === "superadmin") {
      const delBtn = document.createElement("button");
      delBtn.classList.add("danger");
      delBtn.innerText = "Delete";
      delBtn.onclick = async () => {
        await deleteDoc(doc(db, "gig_workers", docSnap.id));
        loadWorkers();
      };
      actions.appendChild(delBtn);
    }

    card.appendChild(actions);
    list.appendChild(card);
  });
};

window.goDashboard = function () {
  window.location.href = "dashboard.html";
};
</script>

</body>
</html>
