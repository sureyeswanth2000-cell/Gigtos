<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Bookings - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>

<div id="header-placeholder"></div>

<div class="container">

  <div class="section-title">Active Bookings</div>
  <div class="count" id="activeCount"></div>
  <div id="activeBookings"></div>

  <div class="section-title">Booking History</div>
  <div class="count" id="historyCount"></div>
  <div id="historyBookings"></div>

</div>

<div id="footer-placeholder"></div>

<!-- Header + Footer -->
<script type="module">
import { renderHeader } from "./components/header.js";
import { renderFooter } from "./components/footer.js";
import { initModal } from "./components/modal.js";

renderHeader();
renderFooter();
initModal();
</script>

<!-- Booking Logic -->
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, getDocs, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser = null;
let authChecked = false;


onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Please login first.");
    window.location.href = "index.html";
    return;
  }
  currentUser = user;
  loadBookings();
});

async function loadBookings() {

  const activeDiv = document.getElementById("activeBookings");
  const historyDiv = document.getElementById("historyBookings");

  activeDiv.innerHTML = "";
  historyDiv.innerHTML = "";

  let activeCount = 0;
  let historyCount = 0;

  const q = query(
    collection(db,"bookings"), 
    where("userId","==",currentUser.uid)
  );

  const snapshot = await getDocs(q);

  if(snapshot.empty){
    activeDiv.innerHTML = "<div class='empty'>No bookings found</div>";
    return;
  }

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const createdTime = data.createdAt?.seconds
      ? new Date(data.createdAt.seconds * 1000).toLocaleString()
      : "Time unavailable";

    const card = document.createElement("div");
    card.classList.add("card");

    if(["pending","assigned","in_progress"].includes(data.status)){
      card.classList.add("active-highlight");
    }

    card.innerHTML = `
      <div class="badge ${data.status}">${data.status.toUpperCase()}</div>
      <div class="service">${data.serviceType}</div>
      <div class="address">${data.address}</div>
      <div class="time">${createdTime}</div>
      <div class="details">
        Phone: ${data.phone}<br>
        Booking ID: ${docSnap.id}
      </div>
    `;

    card.onclick = () => {
      const details = card.querySelector(".details");
      details.style.display = 
        details.style.display === "block" ? "none" : "block";
    };

    if(data.status === "pending"){
      const cancelBtn = document.createElement("button");
      cancelBtn.classList.add("cancel-btn");
      cancelBtn.innerText = "Cancel Booking";
      cancelBtn.onclick = (e) => {
        e.stopPropagation();

        openModal("Are you sure you want to cancel this booking?", async () => {
          await updateDoc(doc(db,"bookings",docSnap.id),{
            status:"cancelled"
          });
          loadBookings();
        });
      };
      card.appendChild(cancelBtn);
    }

    if(["pending","assigned","in_progress"].includes(data.status)){
      activeDiv.appendChild(card);
      activeCount++;
    } else {
      historyDiv.appendChild(card);
      historyCount++;
    }

  });

  document.getElementById("activeCount").innerText =
    activeCount + " active booking(s)";

  document.getElementById("historyCount").innerText =
    historyCount + " completed / cancelled";
}
</script>

</body>
</html>
