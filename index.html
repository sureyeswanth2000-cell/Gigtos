<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gigto – Home Services in Kavali</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ SEO (moved correctly to head) -->
  <meta name="description" content="Gigto provides trusted home services in Kavali including plumbers and electricians at affordable prices. Book now for ₹200 visiting charge.">
  <meta name="keywords" content="Kavali plumber, Kavali electrician, home services Kavali, Gigto services">
  <meta name="author" content="Gigto">
  <meta property="og:title" content="Gigto – Home Services in Kavali">
  <meta property="og:description" content="Trusted plumbers and electricians in Kavali. Book instantly.">
  <meta property="og:type" content="website">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#4f46e5">

  <!-- ✅ Global Styles -->
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>

<!-- ✅ Reusable Header Will Load Here -->
<div id="header-placeholder"></div>

<!-- ================= PAGE CONTENT ================= -->

<div class="hero">
  <h1>Home Services in Kavali</h1>
  <p>Book trusted professionals at just ₹200 visiting charge</p>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search service" oninput="filterServices()">
</div>

<div class="services">

  <div class="card" data-name="plumber">
    <h3>🧰 Plumber</h3>
    <div class="price">₹200 Visiting Charge</div><br>
    <a href="service.html?type=Plumber" class="book-btn">Book</a>
  </div>

  <div class="card" data-name="electrician">
    <h3>⚡ Electrician</h3>
    <div class="price">₹200 Visiting Charge</div><br>
    <a href="service.html?type=Electrician" class="book-btn">Book</a>
  </div>

</div>

<!-- ✅ Reusable Footer Will Load Here -->
<div id="footer-placeholder"></div>

<!-- ================= SCRIPTS ================= -->

<script type="module">
  import { renderHeader } from "./components/header.js";
  import { renderFooter } from "./components/footer.js";
  import { initModal } from "./components/modal.js";

  renderHeader();
  renderFooter();
  initModal();
</script>

<script type="module">
  import { auth, db } from "./firebase.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  window.filterServices = function() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
      const name = card.getAttribute("data-name");
      card.style.display = name.includes(input) ? "block" : "none";
    });
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    const profile = document.getElementById("headerProfile");

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    let displayName = user.phoneNumber;
    if (snap.exists() && snap.data().name) {
      displayName = snap.data().name;
    }

    if (profile) {
      profile.innerText = "👤 " + displayName;
      profile.classList.remove("hidden");
      profile.onclick = () => window.location.href = "profile.html";
    }
  });

</script>

</body>
</html>
