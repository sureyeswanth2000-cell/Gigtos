<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Register - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>

<div class="container">
  <div class="card">
    <h2 id="formTitle">Login</h2>

    <!-- Register Fields -->
    <div id="registerFields" class="hidden">
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="address" placeholder="Address in Kavali">
    </div>

    <input type="text" id="phone" placeholder="10 Digit Phone Number">

    <div id="recaptcha-container"></div>

    <input type="text" id="otp" placeholder="Enter OTP" class="hidden">

    <button id="actionBtn">Send OTP</button>

    <p style="margin-top:15px;">
      <span id="toggleText">New user?</span>
      <a href="#" id="toggleBtn">Register</a>
    </p>

  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let confirmationResult = null;
let isRegister = false;

const actionBtn = document.getElementById("actionBtn");
const toggleBtn = document.getElementById("toggleBtn");

window.recaptchaVerifier = new RecaptchaVerifier(
  auth,
  "recaptcha-container",
  { size: "normal" }
);

// Toggle Mode
toggleBtn.onclick = function(e){
  e.preventDefault();
  isRegister = !isRegister;

  document.getElementById("formTitle").innerText = isRegister ? "Register" : "Login";
  document.getElementById("registerFields").classList.toggle("hidden");
  document.getElementById("toggleText").innerText =
    isRegister ? "Already have account?" : "New user?";
};

// Button Click
actionBtn.onclick = async function(){

  if (!confirmationResult) {
    await sendOTP();
  } else {
    await verifyOTP();
  }
};

async function sendOTP() {

  const phoneInput = document.getElementById("phone").value.trim();

  if(phoneInput.length !== 10){
    alert("Enter valid 10 digit number");
    return;
  }

  const phone = "+91" + phoneInput;

  try{
    confirmationResult = await signInWithPhoneNumber(
      auth,
      phone,
      window.recaptchaVerifier
    );

    document.getElementById("otp").classList.remove("hidden");
    actionBtn.innerText = "Verify OTP";
  }
  catch(error){
    alert(error.message);
  }
}

async function verifyOTP(){

  const otp = document.getElementById("otp").value.trim();

  if(!otp){
    alert("Enter OTP");
    return;
  }

  try{
    const result = await confirmationResult.confirm(otp);
    const user = result.user;

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    // REGISTER MODE
    if(isRegister){

      if(snap.exists()){
        alert("User already exists. Please login.");
        return;
      }

      const name = document.getElementById("name").value.trim();
      const address = document.getElementById("address").value.trim();

      if(!name || !address){
        alert("Name and address required");
        return;
      }

      await setDoc(userRef,{
        name,
        address,
        phone: user.phoneNumber,
        createdAt: new Date()
      });

    }
    // LOGIN MODE
    else{

      if(!snap.exists()){
        alert("User not found. Please register.");
        return;
      }
    }

    const redirect = localStorage.getItem("redirectAfterLogin");
    window.location.href = redirect || "index.html";

  }
  catch(error){
    alert("Invalid OTP");
  }
}
</script>

</body>
</html>
