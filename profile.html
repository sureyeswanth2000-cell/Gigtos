<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - Gigto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global.css">
</head>

<body>

<div id="header-placeholder"></div>

<div class="container">

  <div class="card">
    <h2>My Profile</h2>

    <input type="text" id="phone" placeholder="Phone Number" disabled>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="address" placeholder="Address in Kavali">
    <input type="text" id="altPhone" placeholder="Alternate Phone (Optional)">

    <button onclick="saveProfile()">Save Changes</button>

    <div class="success hidden" id="successMsg">
      Profile Updated Successfully
    </div>
  </div>

</div>

<div id="footer-placeholder"></div>

<script type="module">
import { renderHeader } from "./components/header.js";
import { renderFooter } from "./components/footer.js";
import { initModal } from "./components/modal.js";

renderHeader();
renderFooter();
initModal();
</script>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;

onAuthStateChanged(auth, async (user) => {

  if (!user) return window.location.href = "index.html";

  currentUser = user;

  document.getElementById("phone").value = user.phoneNumber;

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (snap.exists()) {
    const data = snap.data();
    document.getElementById("name").value = data.name || "";
    document.getElementById("address").value = data.address || "";
    document.getElementById("altPhone").value = data.altPhone || "";
  }
});

window.saveProfile = async function() {

  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const altPhone = document.getElementById("altPhone").value.trim();

  if (!name || !address) {
    alert("Name and Address required");
    return;
  }

  await setDoc(doc(db, "users", currentUser.uid), {
    phone: currentUser.phoneNumber,
    name,
    address,
    altPhone,
    updatedAt: new Date()
  }, { merge: true });

  document.getElementById("successMsg").classList.remove("hidden");

  setTimeout(() => {
    document.getElementById("successMsg").classList.add("hidden");
  }, 2000);
};
</script>

</body>
</html>
