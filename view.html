<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  collection, 
  getDocs, 
  doc, 
  getDoc, 
  query, 
  where, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser;
let currentRole;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const adminSnap = await getDoc(doc(db, "admins", user.uid));

  if (!adminSnap.exists()) {
    alert("Not authorized");
    window.location.href = "index.html";
    return;
  }

  currentRole = adminSnap.data().role;
  document.getElementById("roleInfo").innerText = "Role: " + currentRole;

  loadWorkers();
});

async function loadWorkers() {
  const list = document.getElementById("workerList");
  list.innerHTML = "";

  const filter = document.getElementById("filterType").value;

  let q;

  if (currentRole === "superadmin") {
    q = collection(db, "gig_workers");
  } else {
    q = query(
      collection(db, "gig_workers"),
      where("adminId", "==", currentUser.uid)
    );
  }

  const snapshot = await getDocs(q);

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    if (filter !== "all" && data.gigType !== filter) return;

    const card = document.createElement("div");
    card.classList.add("worker-card");

    const status = (data.status || "active").toLowerCase();
    const badgeClass = status === "active" ? "active" : "inactive";

    card.innerHTML = `
      <div class="worker-name">${data.name}</div>
      <div class="worker-meta">
        <span class="status-badge ${badgeClass}">
          ${status.toUpperCase()}
        </span><br>
        ${data.gigType} | 📞 ${data.contact}<br>
        Created By: ${data.createdByEmail}
      </div>
    `;

    const actions = document.createElement("div");
    actions.classList.add("worker-actions");

    // Edit
    if (
      currentRole === "superadmin" ||
      (currentRole === "admin" && data.adminId === currentUser.uid)
    ) {
      const editBtn = document.createElement("button");
      editBtn.classList.add("secondary");
      editBtn.innerText = "Edit";
      editBtn.onclick = () => {
        window.location.href = "dashboard.html?edit=" + docSnap.id;
      };
      actions.appendChild(editBtn);
    }

    // Enable / Disable
    if (currentRole === "superadmin") {
      const toggleBtn = document.createElement("button");
      toggleBtn.classList.add("danger");

      toggleBtn.innerText = status === "active" ? "Disable" : "Enable";

      toggleBtn.onclick = async () => {
        await updateDoc(doc(db, "gig_workers", docSnap.id), {
          status: status === "active" ? "inactive" : "active"
        });
        loadWorkers();
      };

      actions.appendChild(toggleBtn);
    }

    card.appendChild(actions);
    list.appendChild(card);
  });
}

window.goDashboard = function () {
  window.location.href = "dashboard.html";
};
</script>
