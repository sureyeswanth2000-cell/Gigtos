<!DOCTYPE html>
<html>
<head>
<title>Manage Workers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:'Segoe UI';background:#f3f6fb;}
.admin-header{background:#4f46e5;color:white;padding:15px 25px;display:flex;justify-content:space-between;}
.admin-right{display:flex;gap:15px;align-items:center;}
.admin-right button{background:white;color:#4f46e5;border:none;padding:6px 12px;border-radius:6px;}
.container{max-width:1100px;margin:40px auto;padding:20px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.08);margin-bottom:25px;}
table{width:100%;border-collapse:collapse;background:white;border-radius:12px;}
th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;}
th{background:#4f46e5;color:white;}
button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;margin-right:5px;}
.primary{background:#4f46e5;color:white;}
.danger{background:#dc2626;color:white;}
.active{color:green;font-weight:600;}
.inactive{color:red;font-weight:600;}
</style>
</head>
<body>



<div class="container">

<div class="card">
<h3>Create Worker</h3>
<input id="name" placeholder="Worker Name">
<input id="contact" placeholder="10 Digit Phone Number">
<select id="gigType">
<option>Plumber</option>
<option>Electrician</option>
</select>
<button class="primary" onclick="createWorker()">Create Worker</button>
</div>

<div class="card">
<input id="searchWorker" placeholder="Search Worker..." oninput="loadWorkers()">
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Contact</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="workerList"></tbody>
</table>

</div>

<script type="module">
import { auth, db } from "../firebase.js";
  import { renderAdminHeader } from "./admin-menu.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, addDoc, doc, getDoc, updateDoc, deleteDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser,currentRole;

onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href="../auth.html";return;}

  currentUser=user;
  const snap=await getDoc(doc(db,"admins",user.uid));
  if(!snap.exists()||snap.data().status!=="active"){
    await signOut(auth);
    window.location.href="../auth.html";
    return;
  }

  currentRole=snap.data().role;
  renderAdminHeader(user.email);
  // realtime listener for workers
  onSnapshot(collection(db,"gig_workers"), () => {
    loadWorkers();
  });
});

async function loadWorkers(){
  const snapshot=await getDocs(collection(db,"gig_workers"));
  const list=document.getElementById("workerList");
  const search=document.getElementById("searchWorker").value.toLowerCase().trim();
  list.innerHTML="";

  console.log("loadWorkers called", { currentRole, currentUser: currentUser?.uid, search });
  console.log("worker snapshot count", snapshot.size);
  snapshot.forEach(docSnap=>{
    const d = docSnap.data();
    console.log("worker doc", docSnap.id, "adminId", d.adminId, "status", d.status);
  });

  let shownCount = 0;

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();
    const id=docSnap.id;

    // only show workers belonging to this admin (unless superadmin)
    if(currentRole==="admin" && data.adminId!==currentUser.uid) {
      console.log("skipping worker not owned by admin", id, data.adminId);
      return;
    }
    // debug: log worker data on filter check
    // console.log('worker', id, data);
    if(search && !data.name.toLowerCase().includes(search)) return;

    shownCount++;
    list.innerHTML+=`
      <tr>
        <td>${data.name}</td>
        <td>${data.gigType}</td>
        <td>${data.contact}</td>
        <td class="${data.status==="active"?"active":"inactive"}">${data.status}</td>
        <td>
          <button onclick="toggleWorker('${id}','${data.status}')">
            ${data.status==="active"?"Disable":"Enable"}
          </button>
          ${currentRole==="superadmin"?`<button class="danger" onclick="deleteWorker('${id}')">Delete</button>`:""}
        </td>
      </tr>
    `;
  });
  if(shownCount===0 && snapshot.size>0){
    alert("No workers shown for this admin – please check console for details.");
  }
}

window.createWorker = async function(){

  const nameInput = document.getElementById("name");
  const contactInput = document.getElementById("contact");
  const gigTypeInput = document.getElementById("gigType");

  const workerName = nameInput.value.trim();
  const phone = contactInput.value.trim();
  const type = gigTypeInput.value;

  if(!workerName){
    alert("Name required");
    return;
  }

  if(!/^[0-9]{10}$/.test(phone)){
    alert("Enter valid 10 digit phone number");
    return;
  }

  if(!currentUser){
    alert("User not initialized. Try again later.");
    return;
  }

  console.log("creating worker for admin", currentUser.uid);
  try {

    await addDoc(collection(db,"gig_workers"),{
      name: workerName,
      contact: phone,
      gigType: type,
      status: "active",
      adminId: currentUser.uid,
      createdAt: new Date()
    });

    nameInput.value = "";
    contactInput.value = "";

    alert("Worker created successfully");

    // snapshot listener will refresh automatically

  } catch(error){
    console.error(error);
    alert(error.message);
  }
};


window.toggleWorker=async function(id,status){
  await updateDoc(doc(db,"gig_workers",id),{
    status: status==="active"?"inactive":"active"
  });
  loadWorkers();
};

window.deleteWorker=async function(id){
  if(confirm("Delete worker?")){
    await deleteDoc(doc(db,"gig_workers",id));
    loadWorkers();
  }
};

window.logout=async()=>{await signOut(auth);window.location.href="../auth.html";}
window.goDashboard=()=>window.location.href="dashboard.html";
</script>

</body>
</html>
