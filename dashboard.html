<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

  <h2>Admin Dashboard</h2>
  <p id="roleInfo"></p>

  <button onclick="goView()">View Workers</button>
  <button onclick="logout()">Logout</button>

  <hr>

  <h3 id="formTitle">Create Gig Worker</h3>

  <input type="text" id="name" placeholder="Name"><br><br>
  <input type="text" id="contact" placeholder="Contact"><br><br>
  <input type="text" id="aadhaar" placeholder="Aadhaar (Optional)"><br><br>

  <select id="gigType">
    <option value="Plumber">Plumber</option>
    <option value="Electrician">Electrician</option>
  </select><br><br>

  <input type="text" id="address" placeholder="Address"><br><br>
  <input type="text" id="emergencyPhone" placeholder="Emergency Phone (Optional)"><br><br>

  <button onclick="saveWorker()">Save Worker</button>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, addDoc, updateDoc, collection, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  
let currentUser;
let currentRole;

const urlParams = new URLSearchParams(window.location.search);
const editId = urlParams.get("edit");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const adminDoc = await getDoc(doc(db, "admins", user.uid));

  if (!adminDoc.exists()) {
    alert("Not authorized");
    await signOut(auth);
    window.location.href = "index.html";
    return;
  }

  currentRole = adminDoc.data().role;
  document.getElementById("roleInfo").innerText = "Role: " + currentRole;

  if (currentRole === "superadmin") {
  const adminSection = document.createElement("div");

  adminSection.innerHTML = `
    <hr>
    <h3>Create New Admin</h3>
    <input type="email" id="newAdminEmail" placeholder="Admin Email"><br><br>
    <input type="password" id="newAdminPassword" placeholder="Admin Password"><br><br>
    <button onclick="createAdmin()">Create Admin</button>
  `;

  document.body.appendChild(adminSection);
  }
  // If editing worker
  if (editId) {
    const workerSnap = await getDoc(doc(db, "gig_workers", editId));

    if (workerSnap.exists()) {
      const data = workerSnap.data();

      // Admin can edit only own worker
      if (currentRole === "admin" && data.adminId !== currentUser.uid) {
        alert("Not allowed to edit this worker");
        window.location.href = "view.html";
        return;
      }

      document.getElementById("formTitle").innerText = "Edit Gig Worker";
      document.getElementById("name").value = data.name;
      document.getElementById("contact").value = data.contact;
      document.getElementById("aadhaar").value = data.aadhaar || "";
      document.getElementById("gigType").value = data.gigType;
      document.getElementById("address").value = data.address;
      document.getElementById("emergencyPhone").value = data.emergencyPhone || "";
    }
  }
});

window.saveWorker = async function () {
  const name = document.getElementById("name").value;
  const contact = document.getElementById("contact").value;
  const aadhaar = document.getElementById("aadhaar").value;
  const gigType = document.getElementById("gigType").value;
  const address = document.getElementById("address").value;
  const emergencyPhone = document.getElementById("emergencyPhone").value;

  if (!name || !contact || !address) {
    alert("Fill required fields");
    return;
  }

  if (editId) {
    await updateDoc(doc(db, "gig_workers", editId), {
      name,
      contact,
      aadhaar,
      gigType,
      address,
      emergencyPhone
    });

    alert("Worker Updated!");
  } else {
    await addDoc(collection(db, "gig_workers"), {
      name,
      contact,
      aadhaar,
      gigType,
      address,
      emergencyPhone,
      adminId: currentUser.uid,
      createdByEmail: currentUser.email,
      createdAt: new Date()
    });

    alert("Worker Created!");
  }

  window.location.href = "view.html";
};

  

window.createAdmin = async function () {
  const email = document.getElementById("newAdminEmail").value;
  const password = document.getElementById("newAdminPassword").value;

  if (!email || !password) {
    alert("Fill all fields");
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const newUser = userCredential.user;

    await setDoc(doc(db, "admins", newUser.uid), {
      email: email,
      role: "admin",
      createdAt: new Date()
    });

    alert("Admin Created Successfully");
  } catch (error) {
    alert("Error creating admin: " + error.message);
  }
};
  
window.logout = async function () {
  await signOut(auth);
  window.location.href = "index.html";
};

window.goView = function () {
  window.location.href = "view.html";
};
</script>

</body>
</html>
